<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عمليات الإعلام — نظام الوطن | Media Operations — Al Watan ERP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Al Watan ERP design tokens (@alwatan/ui direction):
     official red #B32025, light neutral surfaces, IBM Plex Sans Arabic,
     semantic status colours — brand red is NOT used for every state. */
  :root{
    --bg:#f6f7f8; --panel:#ffffff; --ink:#1f2328; --muted:#5b6470; --line:#e4e7eb;
    --brand:#B32025; --brand2:#8f191d;
    --approval:#7148b3; --changes:#b3791f; --assign:#217a4a; --work:#2b5fa8;
    --review:#4f63c4; --routing:#2b5fa8; --client:#7148b3; --done:#217a4a; --cancelled:#b42318;
    --shadow:0 1px 2px rgba(20,20,25,.04),0 4px 14px rgba(20,20,25,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"IBM Plex Sans Arabic","Segoe UI",Tahoma,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    font-size:14px;line-height:1.5}
  html[dir="rtl"] body{font-family:"IBM Plex Sans Arabic","Segoe UI","Tahoma","Cairo",system-ui,sans-serif}
  button{font-family:inherit;font-size:14px;cursor:pointer}
  a{color:var(--brand2)}
  .hidden{display:none!important}

  /* ===== ERP shell header (white, compact, brand mark + module switcher) ===== */
  /* NEVER wraps — a wrapped ERP header looks broken. Items shrink instead. */
  .topbar{position:sticky;top:0;z-index:40;background:var(--panel);color:var(--ink);
    display:flex;align-items:center;gap:10px;padding:8px 16px;flex-wrap:nowrap;
    border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(20,20,25,.04)}
  .topbar>*{flex:0 0 auto}
  .topbar .spacer{flex:1 1 auto;min-width:0}
  .lang-sw{white-space:nowrap}
  .erp-brand{font-weight:800;font-size:15px;letter-spacing:.6px;color:var(--brand);white-space:nowrap;
    background:transparent;border:0;padding:4px 2px}
  .crumb{background:transparent;border:0}
  .dots{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:0;
    color:var(--muted);padding:2px 6px;border-radius:8px}
  .dots:hover{background:var(--bg);color:var(--brand)}
  .dotgrid{display:grid;grid-template-columns:repeat(3,3px);gap:2px}
  .dotgrid i{width:3px;height:3px;border-radius:50%;background:currentColor;display:block}
  .dots-l{font-size:9px;letter-spacing:.2px;white-space:nowrap}
  .dots-wrap{position:relative;display:flex}
  .mod-pop{position:absolute;inset-inline-start:0;top:44px;width:330px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(16,24,40,.22);z-index:60}
  .mod-h{padding:11px 14px 8px;font-weight:700;font-size:12px;text-transform:uppercase;
    letter-spacing:.4px;color:var(--muted)}
  .mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:0 8px 8px}
  .mod-i{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;font-size:12.5px}
  .mod-i.on{background:var(--brand);color:#fff;font-weight:700}
  .mod-i.off{color:var(--muted);opacity:.5;cursor:not-allowed}
  .mod-ic{font-size:14px}
  .mod-f{padding:9px 14px 12px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}
  .crumb{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted);white-space:nowrap}
  .crumb b{color:var(--ink);font-weight:700}
  .crumb .sep{color:var(--line)}
  .topbar .spacer{flex:1}
  .ic-btn{position:relative;background:transparent;border:0;color:var(--muted);
    padding:7px 9px;border-radius:8px;font-size:14px;line-height:1}
  .ic-btn:hover{background:var(--bg);color:var(--brand)}
  .lang-sw{font-weight:700;font-size:12.5px;letter-spacing:.3px}
  /* light/dark as a real switch, like the reference */
  .theme-sw{display:flex;align-items:center;gap:6px}
  .theme-sw .track{width:30px;height:16px;border-radius:20px;background:var(--line);position:relative;display:inline-block;transition:.18s}
  .theme-sw .track i{position:absolute;top:2px;inset-inline-start:2px;width:12px;height:12px;border-radius:50%;
    background:var(--panel);box-shadow:0 1px 2px rgba(0,0,0,.25);transition:.18s}
  :root[data-theme="dark"] .theme-sw .track{background:var(--brand)}
  :root[data-theme="dark"] .theme-sw .track i{inset-inline-start:16px}
  .theme-sw .sun,.theme-sw .moon{font-size:11px;opacity:.6}
  /* responsive header rules live at the END of this stylesheet — see “responsive
     ERP header”. Placing them here would lose the cascade to the base rules below. */
  .who{display:flex;align-items:center;gap:9px;padding:4px 6px 4px 10px;border:0;background:transparent;
    border-inline-start:1px solid var(--line);border-radius:8px;text-align:start}
  .out-btn{display:flex;align-items:center;justify-content:center}
  .out-btn:hover{background:var(--red-050,#fdecec);color:var(--brand)}
  html[dir="rtl"] .out-btn svg{transform:scaleX(-1)}
  .who-av{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;flex:none}
  .who-txt{display:flex;flex-direction:column;line-height:1.25}
  .who-txt b{font-size:13px}
  .who-txt span{font-size:11.5px;color:var(--muted)}
  /* demo-only account switcher — a real ERP uses Keycloak SSO, never this */
  .topbar select{background:var(--bg);color:var(--muted);border:1px dashed var(--line);
    padding:5px 7px;border-radius:8px;font-size:11.5px;max-width:118px}
  .up-flag{color:var(--brand);font-size:12px}
  .up-cnt{background:var(--bg);border-radius:20px;padding:1px 7px;font-size:11.5px;color:var(--muted)}
  .topbar .badge{position:absolute;top:0;inset-inline-end:2px;background:var(--brand);color:#fff;
    border-radius:20px;min-width:16px;height:16px;padding:0 4px;font-size:10px;
    display:flex;align-items:center;justify-content:center;border:2px solid var(--panel)}
  /* login screen keeps a simple brand row */
  .topbar .logo{font-weight:800;font-size:15px;letter-spacing:.4px;display:flex;align-items:center;gap:8px;color:var(--brand)}
  .topbar .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--brand);display:inline-block}
  .topbar select option{background:var(--panel);color:var(--ink)}
  .topbar .bell{position:relative;display:flex}
  #resetBtn{background:var(--panel);color:var(--muted);border:1px solid var(--line);padding:6px 11px;border-radius:8px;font-size:12.5px}
  #resetBtn:hover{border-color:var(--brand);color:var(--brand)}

  /* Layout */
  .wrap{max-width:1080px;margin:22px auto;padding:0 18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  h1{font-size:22px;margin:0 0 4px} h2{font-size:16px;margin:0 0 12px}
  .muted{color:var(--muted)} .small{font-size:12.5px}

  /* Login (professional) */
  .auth{max-width:940px;margin:14px auto 44px;padding:0 18px;display:flex;flex-direction:column;gap:18px}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 12px 34px rgba(16,24,40,.10);overflow:hidden;max-width:440px;margin:0 auto;width:100%}
  .auth-hero{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:28px 26px 24px;text-align:center}
  .auth-emblem{width:58px;height:58px;border-radius:16px;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto 12px}
  .auth-hero h1{font-size:21px;margin:0;letter-spacing:.2px}
  .auth-hero p{margin:5px 0 0;opacity:.85;font-size:12.5px}
  .auth-body{padding:24px 26px 26px}
  .field{position:relative;margin-bottom:12px}
  .field>.ic{position:absolute;inset-inline-start:13px;top:50%;transform:translateY(-50%);opacity:.5;font-size:15px;pointer-events:none}
  .field input{padding-inline-start:39px;height:46px;width:100%;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--ink);font-size:14px}
  .field input:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(47,93,138,.15)}
  .flabel{font-weight:700;font-size:12.5px;margin:2px 0 6px}
  .auth-body .btn.primary{width:100%;height:46px;font-size:15px;margin-top:6px}
  .pass-hint{margin-top:12px;font-size:12px;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:9px;padding:8px 11px}

  .accounts{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 20px}
  .acct-title{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .acct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:10px;margin-top:8px}
  .acct{display:flex;align-items:center;gap:11px;text-align:start;border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;background:var(--panel);cursor:pointer;transition:.12s}
  .acct:hover{border-color:var(--brand2);box-shadow:var(--shadow);transform:translateY(-1px)}
  .avatar{width:37px;height:37px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
  .acct .nm{font-weight:700;font-size:13.5px;line-height:1.25}
  .acct .rl{font-size:11.5px;color:var(--muted)}
  .acct .un{font-family:monospace;font-size:11px;color:var(--brand2);margin-top:1px}

  /* Buttons */
  .btn{border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:9px;font-weight:600}
  .btn:hover{background:#f7f8fa}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{background:#25476f}
  .btn.good{background:var(--assign);color:#fff;border-color:var(--assign)}
  .btn.warn{background:var(--changes);color:#fff;border-color:var(--changes)}
  .btn.danger{background:var(--cancelled);color:#fff;border-color:var(--cancelled)}
  .btn.blue{background:var(--routing);color:#fff;border-color:var(--routing)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btnrow{display:flex;flex-wrap:wrap;gap:8px}

  /* Forms */
  label.f{display:block;font-weight:600;margin:12px 0 5px}
  input[type=text],input[type=date],input[type=datetime-local],input[type=email],input[type=tel],input[type=file],select.f,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:var(--panel);color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  .req-star{color:var(--cancelled)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  @media(max-width:560px){.form-grid{grid-template-columns:1fr}}
  .map-box{height:260px;border:1px solid var(--line);border-radius:11px;margin-top:6px;overflow:hidden;z-index:0}
  .map-hint{margin-top:8px}
  .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);padding:12px;text-align:center}
  .chk-row{display:flex;align-items:center;gap:10px;margin:16px 0 4px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--bg)}
  .chk-row input{width:18px;height:18px}
  .role-checks{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}
  .role-check{display:flex;align-items:center;gap:8px;min-width:150px;cursor:pointer;
    border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:var(--bg);font-weight:600}
  .role-check input{width:18px;height:18px}
  .attach-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .attach-chip{background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12.5px}
  /* media gallery in a task */
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:6px}
  .media-item{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);text-decoration:none;color:var(--ink)}
  .media-item img,.media-item video{width:100%;height:122px;object-fit:cover;display:block;background:#000}
  .media-cap{padding:6px 9px;font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .media-item.file{align-items:center;justify-content:center;padding:14px;text-align:center;gap:6px}
  .media-item.file .media-cap{white-space:normal}
  .media-file{font-size:30px}
  /* smaller gallery for files attached to a comment */
  .media-grid.compact{grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
  .media-grid.compact .media-item img,.media-grid.compact .media-item video{height:86px}
  .media-grid.compact .media-file{font-size:22px}
  .media-grid.compact .media-item.file{padding:10px}
  :root[data-theme="dark"] input[type=file]{color:var(--ink)}

  /* List */
  .list-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .reqrow{display:flex;gap:12px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .reqrow:last-child{border-bottom:none}
  .reqrow:hover{background:var(--bg)}
  .rq-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .reqrow .idcol{font-weight:700;color:var(--brand);font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.2px}
  .hotdot{color:var(--changes);font-size:11.5px;line-height:1}
  .rq-chev{color:var(--line);font-size:17px;flex:none}
  html[dir="rtl"] .rq-chev{transform:scaleX(-1)}
  .refchip{font-family:monospace;font-weight:700;color:var(--brand2);letter-spacing:.3px}
  .reqrow .main{flex:1}
  .reqrow .t{font-weight:700;font-size:15px}
  .actionflag{background:#fff4e5;color:#b4620a;border:1px solid #f3d3ab;border-radius:20px;
    padding:2px 10px;font-size:11.5px;font-weight:700;white-space:nowrap}
  .quick-actions{display:flex;gap:6px;flex:none}
  .quick-actions .btn{padding:6px 11px;font-size:12.5px;white-space:nowrap}

  /* Status badge — deliberately NOT solid: a status is a state, not a control.
     Tinted pill + coloured dot, so it can never be mistaken for a button sitting
     next to it (e.g. status "Assign team" beside the Assign team action). */
  .st{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;
    font-size:12px;font-weight:600;white-space:nowrap;background:var(--bg);
    border:1px solid var(--line);color:var(--muted)}
  .st::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex:none}
  .st.approval{color:var(--approval)} .st.changes{color:var(--changes)}
  .st.assign{color:var(--assign)} .st.work{color:var(--work)}
  .st.review{color:var(--review)} .st.routing{color:var(--routing)}
  .st.client{color:var(--client)} .st.done{color:var(--done)} .st.cancelled{color:var(--cancelled)}

  /* Detail */
  .summary{padding:18px 20px}
  .sum-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;margin-top:12px}
  .kv .k{color:var(--muted);font-size:12.5px} .kv .v{font-weight:600}
  .section{padding:16px 20px;border-top:1px solid var(--line)}
  .brief{background:#f7f8fa;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px}

  /* Stepper */
  .stepper{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px}
  .step{flex:1;min-width:78px;text-align:center;font-size:11px;color:var(--muted);position:relative}
  .step .num{width:26px;height:26px;border-radius:50%;background:#e6e9ef;color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 5px}
  .step.on .num{background:var(--brand);color:#fff}
  .step.done .num{background:var(--assign);color:#fff}

  /* Timeline */
  .tl{list-style:none;margin:12px 0 0;padding:0}
  .tl li{position:relative;padding-inline-start:20px;padding-bottom:14px}
  .tl li::before{content:"";position:absolute;inset-inline-start:4px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--brand2)}
  .tl li::after{content:"";position:absolute;inset-inline-start:8px;top:14px;bottom:0;width:1px;background:var(--line)}
  .tl li:last-child::after{display:none}
  .tl .who{font-weight:700;font-size:12.5px}
  .tl .tm{color:var(--muted);font-size:11.5px}

  /* comments */
  .cmt{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#fff}
  .cmt .h{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .internal-tag{background:#eef;color:#4152c4;border-radius:6px;padding:1px 6px;font-size:10.5px;font-weight:700}

  /* pick chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{border:1px solid var(--line);border-radius:20px;padding:6px 12px;background:#fff;user-select:none}
  .chip.sel{background:var(--assign);color:#fff;border-color:var(--assign)}

  .note{background:#fbfbe8;border:1px solid #e8e7bd;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#6b6a2a}
  .linkbox{background:#eef4fb;border:1px dashed #9dbbe0;border-radius:8px;padding:8px 10px;font-family:monospace;font-size:12px;word-break:break-all;color:#274b74}

  /* notifications dropdown */
  .noti-pop{position:absolute;inset-inline-end:0;top:44px;width:340px;max-height:420px;overflow-y:auto;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(16,24,40,.22);z-index:50}
  .noti-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0}
  .noti-actions{display:flex;gap:6px;flex-wrap:wrap}
  .noti-btn{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-size:11px;color:var(--ink);cursor:pointer}
  .noti-btn.danger{color:var(--cancelled);border-color:var(--cancelled)}
  .noti-item{position:relative;padding:11px 14px;padding-inline-end:32px;border-bottom:1px solid var(--line)}
  .noti-item:hover{background:var(--bg)}
  .noti-item.unread{background:rgba(47,127,214,.08)}
  .noti-x{position:absolute;inset-inline-end:8px;top:9px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;cursor:pointer}
  .noti-x:hover{background:var(--line);color:var(--ink)}
  .empty{padding:30px;text-align:center;color:var(--muted)}

  /* compact language and theme buttons (top bar) */
  .lang-btn{min-width:42px;font-weight:800}
  .icon-btn{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand)}

  /* ===== dashboard: stats + two-column shell ===== */
  .wrap.wide{max-width:1280px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
  .stat-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;font-size:16px;flex:none}
  .stat-ic.red{background:var(--red-050,#fdecec);color:var(--brand)}
  .stat-ic.blue{background:#eaf1fb;color:var(--work)}
  .stat-ic.amber{background:#fdf3e1;color:var(--changes)}
  .stat-ic.green{background:#e7f6ee;color:var(--assign)}
  :root[data-theme="dark"] .stat-ic.red{background:#3a1416}
  :root[data-theme="dark"] .stat-ic.blue{background:#132540}
  :root[data-theme="dark"] .stat-ic.amber{background:#3a2c12}
  :root[data-theme="dark"] .stat-ic.green{background:#0f2a1c}
  .stat-l{font-size:12px;color:var(--muted)}
  .stat-n{font-size:21px;font-weight:700;line-height:1.2}
  .dash{display:grid;grid-template-columns:minmax(0,1fr) 316px;gap:16px;align-items:start}
  .dash-main{min-width:0}
  .dash-rail{display:flex;flex-direction:column;gap:14px}
  .rail-card{overflow:hidden}
  .rail-h{font-weight:700;font-size:13.5px;padding:13px 16px 10px;display:flex;
    align-items:center;justify-content:space-between;gap:8px}
  .rail-cnt{background:var(--brand);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
  .rail-empty{padding:0 16px 15px;color:var(--muted);font-size:12.5px}
  .aq-row{width:100%;display:flex;align-items:center;gap:9px;padding:9px 16px;background:transparent;
    border:0;border-top:1px solid var(--line);text-align:start}
  .aq-row:hover{background:var(--bg)}
  .aq-dot{width:8px;height:8px;border-radius:50%;flex:none}
  .aq-dot.approval{background:var(--approval)} .aq-dot.changes{background:var(--changes)}
  .aq-dot.assign{background:var(--assign)}     .aq-dot.work{background:var(--work)}
  .aq-dot.review{background:var(--review)}     .aq-dot.routing{background:var(--routing)}
  .aq-dot.client{background:var(--client)}     .aq-dot.done{background:var(--done)}
  .aq-t{flex:1;min-width:0;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .aq-s{font-size:11px;color:var(--muted);white-space:nowrap}
  .wf-role{padding:0 16px;font-weight:600;font-size:13px}
  .wf-sub{padding:3px 16px 15px;color:var(--muted);font-size:12.5px}
  /* detail rail: workflow guide */
  .gr-step{display:flex;gap:10px;padding:0 16px 12px}
  .gr-n{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1px solid var(--line);
    color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;
    justify-content:center;flex:none}
  .gr-n.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .gr-k{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
  .gr-v{font-weight:700;font-size:13px;margin-top:1px}
  .gr-s{font-size:12px;color:var(--muted);margin-top:2px}
  .gr-do{margin:0 16px 15px;padding:10px 12px;border-radius:9px;background:var(--bg);
    border:1px solid var(--line);font-size:12.5px}
  .gr-do.you{border-color:var(--assign);background:rgba(33,122,74,.08)}
  .gr-do.you>div:last-child{color:var(--assign);font-weight:600}
  /* detail rail: team + review */
  .tr-body{padding:0 16px 15px;display:flex;flex-direction:column;gap:10px}
  .tr-row{display:flex;flex-direction:column;gap:2px}
  .tr-k{font-size:11px;font-weight:700;color:var(--muted)}
  .tr-v{font-size:12.5px;font-weight:600;line-height:1.6}

  /* ===== Upcoming Actions ===== */
  .upcoming{margin-bottom:0;overflow:hidden}
  .up-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px 10px}
  .up-title{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:8px}
  .up-link{color:var(--brand);font-weight:600;font-size:13px;cursor:pointer}
  .up-link:hover{text-decoration:underline}
  .up-row{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;position:relative}
  .up-row:hover{background:var(--bg)}
  .up-when{min-width:74px;font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap}
  .up-when.hot{color:var(--brand)}
  .up-dot{width:9px;height:9px;border-radius:50%;flex:none;position:relative;z-index:1;
    box-shadow:0 0 0 3px var(--panel)}
  /* connector line between the dots */
  .up-row:not(:last-of-type) .up-dot::after{content:"";position:absolute;top:9px;inset-inline-start:4px;
    width:1px;height:34px;background:var(--line);z-index:0}
  .up-dot.approval{background:var(--approval)} .up-dot.changes{background:var(--changes)}
  .up-dot.assign{background:var(--assign)}     .up-dot.work{background:var(--work)}
  .up-dot.review{background:var(--review)}     .up-dot.routing{background:var(--routing)}
  .up-dot.client{background:var(--client)}     .up-dot.done{background:var(--done)}
  .up-dot.cancelled{background:var(--cancelled)}
  .up-main{flex:1;min-width:0}
  .up-act{font-weight:700;font-size:14px}
  .up-sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .up-av{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:700;flex:none}
  .up-foot{width:100%;text-align:start;background:transparent;border:0;border-top:1px solid var(--line);
    padding:13px 18px;color:var(--brand);font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
  .up-foot:hover{background:var(--bg)}
  .up-chev{font-size:15px}
  html[dir="rtl"] .up-chev{transform:scaleX(-1)}

  /* dashboard filter tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:7px 13px;border-radius:20px;font-weight:600}
  .tab:hover{border-color:var(--brand2)}
  .tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .tab .cnt{opacity:.7;font-size:11px;margin-inline-start:6px}

  /* guidance card */
  .guide{margin:0 0 14px;border:1px solid var(--line);border-inline-start:4px solid var(--brand2);border-radius:12px;background:var(--panel);padding:14px 16px;box-shadow:var(--shadow)}
  .guide .lead{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .guide .grow{margin-top:9px;display:flex;gap:10px;align-items:flex-start}
  .guide .tagk{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);min-width:78px;padding-top:2px}
  .guide.you{border-inline-start-color:var(--assign)}
  .guide.wait{border-inline-start-color:var(--changes)}
  .guide .youdo{color:var(--assign);font-weight:700}

  /* dark theme */
  :root[data-theme="dark"]{
    --bg:#15171b; --panel:#1c1f24; --ink:#eceef1; --muted:#a4acb6; --line:#2c3038;
    --brand:#B32025; --brand2:#e0666a; --shadow:0 1px 3px rgba(0,0,0,.45);
    /* semantic states lifted for contrast on dark surfaces */
    --approval:#9d78d6; --changes:#d6a04a; --assign:#3da76e; --work:#5b8fd6;
    --review:#7b8ce0; --routing:#5b8fd6; --client:#9d78d6; --done:#3da76e; --cancelled:#e0666a;
    color-scheme:dark;
  }
  :root[data-theme="dark"] .btn{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] .btn:hover{background:#243040}
  :root[data-theme="dark"] input,:root[data-theme="dark"] textarea,:root[data-theme="dark"] select{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] select option{background:#1e2733;color:var(--ink)}
  :root[data-theme="dark"] input::placeholder,:root[data-theme="dark"] textarea::placeholder{color:#aab5c3;opacity:1}
  :root[data-theme="dark"] .topbar select{background:rgba(255,255,255,.12);color:#fff}
  :root[data-theme="dark"] .topbar select option{background:#1e2733;color:var(--ink)}
  :root[data-theme="dark"] .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  :root[data-theme="dark"] .btn.good{background:var(--assign);color:#fff;border-color:var(--assign)}
  :root[data-theme="dark"] .btn.warn{background:var(--changes);color:#fff;border-color:var(--changes)}
  :root[data-theme="dark"] .btn.danger{background:var(--cancelled);color:#fff;border-color:var(--cancelled)}
  :root[data-theme="dark"] .btn.blue{background:var(--routing);color:#fff;border-color:var(--routing)}
  :root[data-theme="dark"] .brief,:root[data-theme="dark"] .role-card,:root[data-theme="dark"] .cmt,:root[data-theme="dark"] .modal,:root[data-theme="dark"] .noti-pop{background:#1b2431}
  :root[data-theme="dark"] .reqrow:hover{background:#1b2431}
  :root[data-theme="dark"] .role-card .ic{background:#232e3d}
  :root[data-theme="dark"] .chip{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] .chip.sel{background:var(--assign);color:#fff;border-color:var(--assign)}
  :root[data-theme="dark"] .note{background:#2a2a18;border-color:#4a4a2a;color:#d9d9a0}
  :root[data-theme="dark"] .tl-note{background:#2a2013;border-color:#5a4020;color:#e8c48a}
  :root[data-theme="dark"] .linkbox{background:#14243a;border-color:#2f5480;color:#a9c8ee}
  :root[data-theme="dark"] .actionflag{background:#3a2a10;border-color:#5c4420;color:#f0b969}
  :root[data-theme="dark"] .noti-item.unread{background:#12243c}
  :root[data-theme="dark"] .internal-tag{background:#25306a;color:#c9d2ff}

  /* timeline note */
  .tl-note{background:#fff7ed;border:1px solid #f3d3ab;border-radius:8px;padding:7px 10px;margin-top:5px;font-size:12.5px;color:#8a4b0a}

  /* before/after diff (change requests + audit trail) */
  .diffbox{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;background:var(--bg)}
  .diff-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .diff-row:last-child{border-bottom:none}
  .diff-k{font-weight:700;font-size:12px;color:var(--muted);min-width:118px}
  .diff-old{background:#fde8e8;color:#9b1c1c;text-decoration:line-through;padding:2px 9px;border-radius:7px;font-size:12.5px}
  .diff-new{background:#def7e4;color:#166f31;padding:2px 9px;border-radius:7px;font-size:12.5px;font-weight:600}
  .diff-arrow{color:var(--muted);font-size:12px}
  .cr-banner{border:1px solid #f3d3ab;border-inline-start:4px solid var(--changes);border-radius:10px;background:#fff7ed;padding:10px 12px;font-size:12.5px;color:#8a4b0a;margin-bottom:10px}
  :root[data-theme="dark"] .diff-old{background:#3a1b1b;color:#f0a4a4}
  :root[data-theme="dark"] .diff-new{background:#16311e;color:#8fdca6}
  :root[data-theme="dark"] .cr-banner{background:#2a2013;border-color:#5a4020;color:#e8c48a}

  /* field tracking (start / finish with date, time & location) */
  .fieldrow{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;background:var(--bg)}
  .fl-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .fl-name{font-weight:700}
  .fl-line{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px;margin-top:6px;font-size:12.5px}
  .fl-k{font-weight:700;font-size:12px;color:var(--muted);min-width:74px}
  .fl-coords{background:#eef4fb;border-radius:7px;padding:2px 8px;font-size:12px}
  .fl-sim{background:#fff4e5;color:#b4620a;border:1px solid #f3d3ab;border-radius:20px;padding:1px 8px;font-size:11px}
  :root[data-theme="dark"] .fl-coords{background:#1e2733}
  :root[data-theme="dark"] .fl-sim{background:#3a2a10;border-color:#5c4420;color:#f0b969}

  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(16,24,40,.45);display:flex;align-items:center;justify-content:center;z-index:80;padding:18px}
  .modal{background:var(--panel);color:var(--ink);border-radius:14px;box-shadow:0 12px 40px rgba(16,24,40,.28);padding:20px 22px;width:100%;max-width:440px}
  .modal-lg{max-width:560px;max-height:calc(100vh - 60px);overflow-y:auto}
  .modal-h{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .modal-h h2{margin:0}
  .modal-x{background:transparent;border:0;color:var(--muted);font-size:15px;padding:2px 6px;border-radius:7px}
  .modal-x:hover{background:var(--bg);color:var(--ink)}
  .modal-f{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .fld-l{font-weight:700;font-size:12.5px;margin-bottom:6px}
  /* wizard step header */
  .wiz{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin:10px 0 8px}
  .wiz-i{display:flex;align-items:center;gap:7px}
  .wiz-s{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1px solid var(--line);
    color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .wiz-s.on{background:var(--ink);border-color:var(--ink);color:var(--panel)}
  .wiz-s.done{background:var(--assign);border-color:var(--assign);color:#fff}
  .wiz-l{font-size:12.5px;color:var(--muted)}
  .wiz-l.on{color:var(--ink);font-weight:700}
  .wiz-bar{height:4px;border-radius:4px;background:var(--line);overflow:hidden;margin-bottom:16px}
  .wiz-bar i{display:block;height:100%;background:var(--brand);transition:width .25s}
  .seq-kind{font-size:11px;color:var(--muted);white-space:nowrap}
  /* assign-modal timeline preview */
  .tlp{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px;border:1px solid var(--line);
    border-radius:10px;background:var(--bg)}
  .tlp-i{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:78px}
  .tlp-av{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:700}
  .tlp-n{font-size:11.5px;font-weight:700;text-align:center}
  .tlp-k{font-size:10px;color:var(--muted)}
  .tlp-a{color:var(--line);font-size:16px}
  html[dir="rtl"] .tlp-a{transform:scaleX(-1)}
  /* drag-to-order work sequence */
  .seq{display:flex;flex-direction:column;gap:12px}
  .seq-g{display:flex;flex-direction:column;gap:6px}
  .seq-gh{font-size:11.5px;font-weight:700;color:var(--muted)}
  .seq-row.static{cursor:default;opacity:.85}
  .seq-n.alt{background:var(--line);color:var(--muted)}
  .seq-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);
    border-radius:9px;background:var(--bg)}
  .seq-row.dragging{opacity:.6;border-color:var(--brand);box-shadow:0 4px 14px rgba(20,20,25,.18)}
  /* the grip is the drag handle — touch-action:none stops the phone scrolling instead */
  .seq-grip{cursor:grab;touch-action:none;padding:6px 4px;margin:-6px -2px;
    min-width:24px;text-align:center;user-select:none}
  .seq-grip:active{cursor:grabbing}
  .seq-n{width:20px;height:20px;border-radius:50%;background:var(--brand);color:#fff;font-size:11px;
    font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .seq-grip{color:var(--muted);font-size:13px}
  .seq-name{flex:1;font-size:13px;font-weight:600}
  .seq-btns{display:flex;gap:3px}
  .seq-b{background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--muted);
    font-size:10px;padding:3px 6px;line-height:1}
  .seq-b:disabled{opacity:.35}
  .seq-b:not(:disabled):hover{border-color:var(--brand);color:var(--brand)}
  /* fixed stage order strip */
  .stagebar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:16px;padding-top:14px;
    border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .sb-i{display:flex;align-items:center;gap:5px;white-space:nowrap}
  .sb-d{width:7px;height:7px;border-radius:50%;display:inline-block}
  .sb-d.work{background:var(--work)} .sb-d.review{background:var(--review)}
  .sb-d.client{background:var(--client)} .sb-d.done{background:var(--done)}
  .sb-a{color:var(--line)}
  html[dir="rtl"] .sb-a{transform:scaleX(-1)}

  /* Mobile layout */
  @media(max-width:720px){
    body{font-size:13.5px}
    .topbar{position:relative;flex-wrap:wrap;gap:8px;padding:10px 12px}
    .topbar .logo{flex:1;min-width:150px;font-size:15px}
    .topbar .spacer{display:none}
    .topbar .navlink{order:3;flex:1;padding:7px 6px;font-size:12px}
    .topbar .bell{margin-inline-start:auto}
    .topbar select{max-width:140px}
    .topbar #logoutBtn{padding:6px 8px}
    .wrap{margin:14px auto;padding:0 12px}
    .card{border-radius:12px}
    .list-head{flex-wrap:wrap;margin-bottom:12px}
    .list-head h1{width:100%;font-size:20px}
    .tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-inline:-2px}
    .tab{white-space:nowrap;flex:0 0 auto;padding:7px 11px}
    .reqrow{flex-wrap:wrap;gap:8px;padding:13px 14px}
    .reqrow .idcol{min-width:0;width:100%;padding:0;font-size:12px}
    .reqrow .main{min-width:0;width:100%}
    .reqrow .t{font-size:14px}
    .reqrow > div:last-child{width:100%;align-items:flex-start!important;text-align:start!important;flex-direction:row!important;flex-wrap:wrap}
    .quick-actions{justify-content:flex-start;width:100%}
    .quick-actions .btn{flex:1 1 145px;padding:8px 9px}
    .summary{padding:15px 14px}
    .section{padding:14px}
    .sum-top{gap:8px}
    .kv{grid-template-columns:1fr;gap:3px;margin-top:10px}
    .kv .k{margin-top:7px}
    .stepper{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;gap:8px}
    .step{flex:0 0 68px;min-width:68px;font-size:10px}
    .guide{padding:12px 13px}
    .guide .grow{gap:7px}
    .guide .tagk{min-width:65px}
    .role-checks{gap:8px}
    .role-check{flex:1;min-width:132px}
    .map-box{height:220px}
    .btnrow .btn{flex:1 1 150px}
    .chips{gap:7px}
    .chip{padding:7px 10px}
    .noti-pop{position:fixed;inset-inline:12px;top:62px;width:auto;max-height:calc(100dvh - 78px)}
    .modal{width:calc(100vw - 24px);max-height:calc(100dvh - 24px);overflow-y:auto}
  }

  @media(max-width:380px){
    .topbar .logo{min-width:120px}
    .quick-actions .btn{flex-basis:100%}
  }

  /* ===== responsive ERP header =====
     Sheds the least important element first so the bar NEVER wraps:
     label → glyphs → breadcrumb prefix → role line → module switcher → name →
     breadcrumb. Must sit after the base rules to win the cascade. */
  @media(max-width:1180px){
    .dots-l{display:none}
    .theme-sw .sun,.theme-sw .moon{display:none}
    .topbar{gap:8px;padding:8px 12px}
  }
  @media(max-width:900px){
    .crumb span:first-child,.crumb .sep{display:none}
    .who-txt span{display:none}
    .erp-brand{font-size:13px;letter-spacing:.3px}
  }
  @media(max-width:640px){
    .topbar{gap:5px;padding:7px 10px}
    .dots{display:none}
    .who{padding-inline-start:5px;border-inline-start:0}
    .who-txt{display:none}                       /* avatar only */
    .crumb b{font-size:12.5px}
    .lang-sw{font-size:11px;padding:6px 4px}
    .ic-btn{padding:6px 4px}
    .who-av{width:28px;height:28px;font-size:11px}
  }
  @media(max-width:520px){
    .crumb{display:none}                         /* page title already says where you are */
    .erp-brand{font-size:12px;letter-spacing:.2px}
    .theme-sw .track{width:26px;height:14px}
    .theme-sw .track i{width:10px;height:10px}
    :root[data-theme="dark"] .theme-sw .track i{inset-inline-start:14px}
  }
  @media(max-width:360px){
    .erp-brand{font-size:0;padding:0}            /* mark only, keeps the anchor */
    .erp-brand::before{content:"AW";font-size:13px;font-weight:800;letter-spacing:.5px}
  }

  /* ===== responsive dashboard =====
     These MUST come after the base .dash/.stats rules — same specificity, so the
     later rule wins and an earlier media query would silently lose. */
  @media(max-width:1100px){
    .dash{grid-template-columns:minmax(0,1fr)}
    .dash-rail{flex-direction:row;flex-wrap:wrap}
    .dash-rail>*{flex:1 1 290px}
  }
  @media(max-width:820px){
    .stats{grid-template-columns:repeat(2,1fr);gap:10px}
    .stat{padding:12px 13px}
    .stat-n{font-size:19px}
  }
  @media(max-width:720px){
    .reqrow{flex-wrap:wrap;gap:9px}
    .reqrow .main{flex:1 1 100%}
    .reqrow .st{order:-1}
    .quick-actions{width:100%}
    .quick-actions .btn{flex:1}
    .rq-chev{display:none}
    /* MUST reset wrap too: a column flex container that still wraps sizes its
       children by content, not by the container — that overflowed the page. */
    .dash-rail{flex-direction:column;flex-wrap:nowrap}
    .dash-rail>*{flex:1 1 auto;min-width:0}
  }
  @media(max-width:460px){
    .stats{grid-template-columns:1fr 1fr;gap:8px}
    .stat{flex-direction:column;align-items:flex-start;gap:5px;padding:11px 12px}
    .stat-ic{width:30px;height:30px;border-radius:8px;font-size:14px}
    .stat-l{font-size:11.5px;line-height:1.25}
    .stat-n{font-size:20px}
    .wrap{padding:0 12px}
    .list-head h1{font-size:19px}
    /* comfortable touch targets (blueprint: min 44px) */
    .seq-row{padding:10px}
    .seq-b{padding:8px 9px;font-size:11px}
    .modal{padding:16px 15px}

const KIND_LABEL = {

function kindOf(id){ if(ROLES.includes(id)) return id; if(REVIEWERS[id]) return REVIEWERS[id].stage; return (typeof STAFF!=="undefined" && STAFF[id]) ? STAFF[id] : "staff"; }
/* "staff" = production team members (assigned per-request). Reviewers are org-level
   accounts, not production staff, so they are excluded here. */
function isStaff(id){ return !ROLES.includes(id) && !REVIEWERS[id]; }
function roleName(r){
  if(REVIEWERS[r]) return REVIEWERS[r][state.lang];   /* reviewer job title */
  if(ROLE_LABEL[r]) return ROLE_LABEL[r][state.lang];

  return KIND_LABEL[k] ? (r+" · "+KIND_LABEL[k][state.lang]) : r;
}

/* ---------- modal scroll lock ----------
   Without this the page behind a modal scrolls under your finger on a phone.
   Position-fixed + restoring scrollTop is the only approach that also stops
   iOS Safari's rubber-band scroll chaining. */
let _lockY=0, _lockDepth=0;
function lockScroll(){
  if(_lockDepth++) return;
  _lockY=window.scrollY||document.documentElement.scrollTop||0;
  const b=document.body;
  b.style.position="fixed"; b.style.top=(-_lockY)+"px";
  b.style.insetInlineStart="0"; b.style.width="100%";
  b.style.overflow="hidden";
}
function unlockScroll(){
  if(--_lockDepth>0) return;
  _lockDepth=0;
  const b=document.body;
  b.style.position=""; b.style.top=""; b.style.insetInlineStart="";
  b.style.width=""; b.style.overflow="";
  window.scrollTo(0,_lockY);
}
function migrateSavedWorkflow(saved){
  let changed=false;
  /* v6 task 5: review1/review2 became two review *stages* with four named reviewers.
     Old logins/notifications keyed on "review1"/"review2" get remapped to real reviewers. */
  const legacyRev={review1:"rev_direction", review2:"rev_editorial"};
  if(legacyRev[saved.currentUser]){ saved.currentUser=legacyRev[saved.currentUser]; changed=true; }
  (saved.notifications||[]).forEach(n=>{
    if(legacyRev[n.role]){ n.role=legacyRev[n.role]; changed=true; }
  });
  (saved.requests||[]).forEach(rq=>{
    /* g1By/g2By: earlier builds stored a single id (or null); normalise to an array */
    const toArr=(v,fallback)=> v==null ? (fallback||[]) : (Array.isArray(v)?v:[v]);
    if(!Array.isArray(rq.g1By)){ rq.g1By = toArr(rq.g1By, rq.g1?["rev_direction"]:[]); changed=true; }
    if(!Array.isArray(rq.g2By)){ rq.g2By = toArr(rq.g2By, rq.g2?["rev_editorial"]:[]); changed=true; }
    /* v6 task 6: field tracking store (start/finish with location) */
    if(!rq.field || typeof rq.field!=="object"){ rq.field={}; changed=true; }
    const assign=rq.assign;
    if(assign && assign.journalist===undefined){ assign.journalist=null; changed=true; }
    if(assign && assign.journalistNeeded===undefined){ assign.journalistNeeded=false; changed=true; }
    if(assign && assign.heba===undefined){ assign.heba=null; changed=true; }
    /* Heba is now one specific person — remap any earlier placeholder names */
    if(assign && assign.heba && assign.heba!=="Heba"){ assign.heba="Heba"; changed=true; }
    if(assign && assign.hebaNeeded===undefined){ assign.hebaNeeded=false; changed=true; }
    if(assign && !Array.isArray(assign.shooting)){ assign.shooting=[]; changed=true; }
    /* v6: producers removed from the workflow — clear them from old saves */
    if(assign && Array.isArray(assign.producers) && assign.producers.length){ assign.producers=[]; changed=true; }
    const teamWasAlreadyComplete=assign&&assign.reporterChosen&&assign.reporter&&assign.producers?.length&&assign.editors?.length;
    if(rq.status==="assign_team"&&teamWasAlreadyComplete){
      rq.status="in_progress";
      rq.timeline=rq.timeline||[];
      rq.timeline.push(tl("journal","Workflow updated — Editorial Manager selection starts production directly.","تم تحديث سير العمل — اختيار مسؤول المحررين يبدأ الإنتاج مباشرة."));
      changed=true;
    }
  });
  return changed;
}

/* ---------- work tracking (start / finish with date, time & location) ---------- */
/* every assigned member stamps their OWN stage: the field crew at Shooting,
   the video editor at Editing. "In progress" is prep/planning — nothing to stamp. */
const TRACK_STAGES=["shooting","editing"];
function stageMembers(rq, status){
  const a=(rq&&rq.assign)||{};
  if(status==="shooting") return [...(a.shooting||[]), a.reporter, a.journalist, a.heba].filter(Boolean);
  if(status==="editing")  return [...(a.editors||[])];
  return [];
}
function trackedMembers(rq){
  const out=[]; TRACK_STAGES.forEach(s=>stageMembers(rq,s).forEach(n=>{ if(!out.includes(n)) out.push(n); }));
  return out;
}
function trackStageOf(rq,uid){ return TRACK_STAGES.find(s=>stageMembers(rq,s).includes(uid))||null; }
/* the member may stamp only while their own stage is the current one */
function canTrackNow(rq,uid){ return trackStageOf(rq,uid)===rq.status; }
/* …and must stamp both بدء and إنهاء before they can end that stage */
function fieldGated(rq,uid){
  if(!canTrackNow(rq,uid)) return false;
  const rec=(rq.field||{})[uid]||{};
  return !(rec.start && rec.end);
}
/* v7/T4 — the stage closes when the LAST required member finishes.
   Each member's ⏹ إنهاء العمل stops only their own tracking; when every assigned
   member on the current stage has an end stamp, the request advances by itself.
   There is no separate "إنهاء المرحلة" button any more. */
function stageAllFinished(rq, status){
  const members=stageMembers(rq,status);
  if(!members.length) return false;
  const recs=rq.field||{};
  return members.every(n=>recs[n] && recs[n].start && recs[n].end);
}
function finishStageIfDone(rq){
  if(!TRACK_STAGES.includes(rq.status)) return false;
  if(!stageAllFinished(rq,rq.status)) return false;
  const next = rq.status==="shooting" ? "editing" : "internal_review";
  if(next==="internal_review"){
    rq.g1=false; rq.g2=false; rq.g1By=[]; rq.g2By=[];
    addTl(rq,"All assigned members finished — sent to internal review (two stages).",

/* browser geolocation, with a simulated fallback (denied / unavailable / offline demo)
   built around the request's own event location so the demo never breaks */
function captureLocation(rq, cb){
  const fallback=()=>{
    const bLat=rq.locationLat!=null?rq.locationLat:26.2285;
    const bLng=rq.locationLng!=null?rq.locationLng:50.586;
    const jitter=()=>(Math.random()-0.5)*0.004;
    cb({time:Date.now(), lat:+(bLat+jitter()).toFixed(5), lng:+(bLng+jitter()).toFixed(5), acc:null, sim:true});
  };
  if(!navigator.geolocation) return fallback();
  let settled=false;
  const guard=setTimeout(()=>{ if(!settled){ settled=true; fallback(); } }, 9000);
  navigator.geolocation.getCurrentPosition(
    p=>{ if(settled) return; settled=true; clearTimeout(guard);
      cb({time:Date.now(), lat:+p.coords.latitude.toFixed(5), lng:+p.coords.longitude.toFixed(5),
          acc:p.coords.accuracy!=null?Math.round(p.coords.accuracy):null, sim:false}); },
    ()=>{ if(settled) return; settled=true; clearTimeout(guard); fallback(); },
    {enableHighAccuracy:true, timeout:8000, maximumAge:0});
}

/* ---------- change-request diff (before/after audit) ---------- */
const DIFF_LABEL={title:"f_title",client:"f_client",contact:"f_contact",phone:"f_phone",phone2:"f_phone2",
  email:"f_email",email2:"f_email2",eventDateTime:"f_event_dt",due:"f_delivery",coverage:"f_coverage",eventType:"f_event_type",
  locationText:"f_location",notes:"f_notes",editorial:"f_reporter_q",attachments:"diff_attach_new"};
function diffFmt(k,v){
  if(k==="coverage") return covLabel(v);
  if(k==="eventType") return evtypeLabel(v);
  if(k==="eventDateTime") return v?fmtDate(v):"—";
  if(k==="due") return v?fmtDay(v):"—";
  if(k==="editorial") return (v&&v.length)?v.map(x=>t(x)).join(state.lang==="ar"?"، ":", "):"—";
  if(k==="attachments") return (v||[]).join(state.lang==="ar"?"، ":", ");
  return (v==null||v==="")?"—":v;
}
/* compare current request vs a proposed edit → [{k,before,after}] */
function computeDiff(rq, fields, flags, files){
  const out=[];
  const eq=(a,b)=>String(a==null?"":a)===String(b==null?"":b);
  ["title","client","contact","phone","phone2","email","email2","eventDateTime","due","coverage","eventType","locationText","notes"]
    .forEach(f=>{ if(!eq(rq[f],fields[f])) out.push({k:f,before:rq[f]||"",after:fields[f]||""}); });
  const rolesOf=(rep,jour,heba)=>[rep&&"f_reporter",jour&&"f_journalist",heba&&"f_heba"].filter(Boolean);
  const beforeR=rolesOf(rq.assign.reporterNeeded,rq.assign.journalistNeeded,rq.assign.hebaNeeded);
  const afterR =rolesOf(flags.reporterNeeded,flags.journalistNeeded,flags.hebaNeeded);
  if(beforeR.join("|")!==afterR.join("|")) out.push({k:"editorial",before:beforeR,after:afterR});
  if(files&&files.length) out.push({k:"attachments",before:null,after:files.map(f=>f.name)});
  return out;
}
function diffTable(diff){
  const arrow = state.lang==="ar"?"←":"→";
  const rows=diff.map(d=>{
    const label=esc(t(DIFF_LABEL[d.k]||d.k));
    if(d.before==null) /* additions only (attachments) */
      return `<div class="diff-row"><span class="diff-k">${label}</span><span class="diff-new" dir="auto">＋ ${esc(diffFmt(d.k,d.after))}</span></div>`;
    return `<div class="diff-row"><span class="diff-k">${label}</span>
      <span class="diff-old" dir="auto">${esc(diffFmt(d.k,d.before))}</span>
      <span class="diff-arrow">${arrow}</span>
      <span class="diff-new" dir="auto">${esc(diffFmt(d.k,d.after))}</span></div>`;
  }).join("");
  return `<div class="diffbox">${rows}</div>`;
}

function isOwner(req, uid){

  /* a reviewer stays flagged (⚡ / "needs my action") until THEY personally approve —
     even if a colleague already covered their stage they may still optionally approve
     while the request is in review; the flag also clears once review completes (leaves this status) */
  if(k==="review1") return isReviewer(uid) && !(req.g1By||[]).includes(uid);
  if(k==="review2") return isReviewer(uid) && !(req.g2By||[]).includes(uid);
  if(k==="producer") return req.assign.producers.includes(uid);
  if(k==="shooter")  return req.assign.shooting.includes(uid);
  if(k==="editor")   return req.assign.editors.includes(uid);
  if(k==="reporter") return req.assign.reporter===uid;
  if(k==="journalist") return req.assign.journalist===uid;
  if(k==="heba") return req.assign.heba===uid;
  return true; // org roles
}
// resolve current owners of a request to concrete user ids (for notifications)
function ownersOf(req){
  const out=[];
  (STATUS[req.status].owner||[]).forEach(k=>{
    if(k==="producer") out.push(...req.assign.producers);
    else if(k==="shooter") out.push(...req.assign.shooting);
    else if(k==="editor") out.push(...req.assign.editors);
    else if(k==="reporter"){ if(req.assign.reporter) out.push(req.assign.reporter); }
    else if(k==="journalist"){ if(req.assign.journalist) out.push(req.assign.journalist); }
    else if(k==="heba"){ if(req.assign.heba) out.push(req.assign.heba); }
    else if(k==="review1"){ if(!req.g1) out.push(...reviewersOfStage("review1")); }
    else if(k==="review2"){ if(!req.g2) out.push(...reviewersOfStage("review2")); }
    else out.push(k);
  });
  return [...new Set(out)];
}
function notifyOwners(req,en,ar){ ownersOf(req).forEach(uid=>pushNoti(uid,req,en,ar)); }
/* notify every reviewer of a stage ("review1"/"review2"), or all reviewers if omitted */
function notifyReviewers(req,en,ar,stage){
  const targets = stage ? reviewersOfStage(stage) : Object.keys(REVIEWERS);
  targets.forEach(uid=>pushNoti(uid,req,en,ar));
}
function ownerLabel(req){
  /* Internal review is owned by two GROUPS, not four individuals — listing every
     reviewer name here made the "waiting on" line unreadable. Name the group(s). */
  if(req.status==="internal_review"){
    const need=[];
    if(!req.g1) need.push(t("grp1_short"));
    if(!req.g2) need.push(t("grp2_short"));
    if(need.length) return need.join(" + ");
  }
  const ids = ownersOf(req);
  if(ids.length) return ids.map(roleName).join(" / ");
  return (STATUS[req.status].owner||[]).map(k=>ROLE_LABEL[k]?ROLE_LABEL[k][state.lang]:(KIND_LABEL[k]?KIND_LABEL[k][state.lang]:k)).join(" / ")||"—";
}
function guidanceCard(req, role){
  const g=STAGE_GUIDE[req.status]; if(!g) return "";
  const done = req.status==="published"||req.status==="cancelled";
  const mine = isOwner(req, role);
  const isClient = role==="client";
  let cls = done ? "" : (mine ? "you" : "wait");
  let todoRow="";
  if(!done){
    let todo;
    if(mine) todo = `<span class="youdo">➡ ${esc(g.o[state.lang])}</span>`;
    else if(isClient) todo = `<span class="muted">${esc(t("g_client_wait"))}</span>`;
    else todo = `<span class="muted">${esc(t("g_waiting"))}: <b>${esc(ownerLabel(req))}</b></span>`;
    todoRow = `<div class="grow"><span class="tagk">${esc(t("g_todo"))}</span>${todo}</div>`;
  }
  const nextRow = (!isClient && g.n[state.lang]!=="—")
    ? `<div class="grow"><span class="tagk">${esc(t("g_next"))}</span><span dir="auto">${esc(g.n[state.lang])}</span></div>` : "";
  return `<div class="guide ${cls}">
     <div class="lead">📍 ${esc(statusLabel(req.status))}</div>
     <div class="grow"><span class="tagk">${esc(t("g_here"))}</span><span dir="auto">${esc(g.d[state.lang])}</span></div>
     ${nextRow}
     ${todoRow}
   </div>`;
}

function addTl(req,en,ar,note,files){ req.timeline.push(tlNote(myRole(),en,ar,note,files)); }

let _formLoc = {lat:null,lng:null};
let _leafMap=null, _leafMarker=null, _setCoordsFn=null;
function initFormMap(rq){
  const el=document.getElementById("n_map"); if(!el) return;
  _formLoc = (rq && rq.locationLat!=null) ? {lat:rq.locationLat,lng:rq.locationLng} : {lat:null,lng:null};
  _leafMap=null; _leafMarker=null;
  const coordsEl=document.getElementById("n_coords");
  const setCoords=(lat,lng)=>{ _formLoc={lat:+lat.toFixed(5),lng:+lng.toFixed(5)}; if(coordsEl) coordsEl.textContent=`📍 ${_formLoc.lat}, ${_formLoc.lng}`; };
  _setCoordsFn=setCoords;
  if(typeof L==="undefined"){
    el.innerHTML=`<div class="map-fallback">${esc(state.lang==="ar"?"الخريطة غير متاحة دون اتصال — استخدم حقل النص.":"Map unavailable offline — use the text field above.")}</div>`;
    return;
  }
  const sLat = _formLoc.lat!=null?_formLoc.lat:26.2285, sLng=_formLoc.lng!=null?_formLoc.lng:50.586;
  const map=L.map(el).setView([sLat,sLng], _formLoc.lat!=null?14:10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  _leafMarker = _formLoc.lat!=null ? L.marker([sLat,sLng]).addTo(map) : null;
  if(_formLoc.lat!=null) setCoords(sLat,sLng);
  map.on('click', e=>{
    if(_leafMarker) _leafMarker.setLatLng(e.latlng); else _leafMarker=L.marker(e.latlng).addTo(map);
    setCoords(e.latlng.lat, e.latlng.lng);
  });
  _leafMap=map;
  setTimeout(()=>map.invalidateSize(), 80);
}
function formSetLocation(lat,lng){
  if(_setCoordsFn) _setCoordsFn(lat,lng);
  if(_leafMap){
    if(_leafMarker) _leafMarker.setLatLng([lat,lng]); else _leafMarker=L.marker([lat,lng]).addTo(_leafMap);
    _leafMap.setView([lat,lng],14);
  }
}
// read uploaded files → {name,size,type,url}. Embed the data URL for smaller files
// so it can be previewed and survive a reload (localStorage has limited space).
const EMBED_LIMIT = 2600000; // ~2.6 MB
function readFiles(fileList){
  return Promise.all([...fileList].map(f=>new Promise(res=>{
    const meta={name:f.name, size:f.size, type:f.type||""};
    if(f.size>EMBED_LIMIT){ res(meta); return; }
    const r=new FileReader();
    r.onload=()=>{ meta.url=r.result; res(meta); };
    r.onerror=()=>res(meta);
    r.readAsDataURL(f);
  })));
}
function bindNew(){
  const rqEdit = (state.editReq||state.crEdit) ? reqById(state.editReq||state.crEdit) : null;

    set("n_client",c.name); set("n_contact",c.contact); set("n_phone",c.phone);

  };
  const reveal=(btnId,wrapId,inputId)=>{
    const b=document.getElementById(btnId); if(!b) return;
    b.onclick=()=>{ b.style.display="none";
      document.getElementById(wrapId).classList.remove("hidden");

  };
  reveal("addPhone2","phone2Wrap","n_phone2");
  reveal("addEmail2","email2Wrap","n_email2");
  const leaveForm=()=>{
    const backTo=state.crEdit||state.editReq;
    state.editReq=null; state.crEdit=null;
    if(backTo){ state.activeReq=backTo; state.view="detail"; } else state.view="list";
    save(); render();
  };
  document.getElementById("n_cancel").onclick=leaveForm;
  const nb=document.getElementById("n_back"); if(nb) nb.onclick=leaveForm;
  document.getElementById("n_submit").onclick=async ()=>{
    const g=id=>{const el=document.getElementById(id); return el?el.value.trim():"";};
    const err=document.getElementById("n_err");
    const title=g("n_title"), client=g("n_client"), due=g("n_due");
    const coverage=document.getElementById("n_coverage").value, eventType=document.getElementById("n_eventType").value;
    const contact=g("n_contact"), phone=g("n_phone"), phone2=g("n_phone2"), email=g("n_email"), email2=g("n_email2");
    const eventDateTime=g("n_eventDateTime");
    const eventDate=eventDateTime ? eventDateTime.slice(0,10) : (rqEdit ? rqEdit.eventDate : "");
    const locationText=g("n_locationText"), notes=g("n_notes");
    const reporterNeeded=document.getElementById("n_reporter").checked;
    const journalistNeeded=document.getElementById("n_journalist").checked;
    const hebaNeeded=document.getElementById("n_heba").checked;
    const files=await readFiles(document.getElementById("n_attach").files||[]);
    /* v7/T1: coverage + event type are required and are never auto-filled */
    if(!title||!client||!due||!coverage||!eventType){
      err.textContent = state.lang==="ar"?"الرجاء تعبئة الحقول المطلوبة (*).":"Please fill the required fields (*).";
      return;
    }
    const past=d=> d && d.slice(0,10) < todayISO();
    if(past(due)||past(eventDate)||past(eventDateTime)){
      err.textContent = state.lang==="ar"?"لا يمكن اختيار تاريخ قبل اليوم.":"Dates cannot be earlier than today.";
      return;
    }
    const fields={ title,client,contact,phone,phone2,email,email2,eventDate,eventDateTime,coverage,eventType,
      due,locationText,locationLat:_formLoc.lat,locationLng:_formLoc.lng,notes };

    /* change request on an active request — nothing applies until Marketing approves */
    if(state.crEdit){
      const rq=reqById(state.crEdit); const note=g("n_note");
      if(!note){ err.textContent=t("change_note_req"); return; }
      const flags={reporterNeeded,journalistNeeded,hebaNeeded};
      const diff=computeDiff(rq,fields,flags,files);
      if(!diff.length){ err.textContent=t("no_diff_err"); return; }
      rq.changeReq={fields,flags,attachments:files,note,time:Date.now(),diff};
      rq.timeline.push(Object.assign(
        tlNote("requester","Submitted a change request — awaiting Marketing approval.","قدّم طلب تعديل — بانتظار موافقة التسويق.",note),
        {diff}));
      pushNoti("marketing",rq,"A change request awaits your approval.","طلب تعديل بانتظار موافقتك.");
      state.crEdit=null; state.activeReq=rq.id; state.view="detail"; save(); render(); return;
    }

    if(state.editReq){
      const rq=reqById(state.editReq); const note=g("n_note");
      /* v7/T2: editing IN PLACE (still in Marketing approval) vs resubmitting after
         Marketing asked for changes. Both log a diff; only the resubmit re-notifies. */
      const inPlace = rq.status==="marketing_approval";
      /* capture the before/after diff BEFORE applying, so the audit shows old vs new */
      const diff=computeDiff(rq,fields,{reporterNeeded,journalistNeeded,hebaNeeded},files);
      Object.assign(rq, fields);
      rq.attachments=(rq.attachments||[]).concat(files);
      rq.assign.reporterNeeded=reporterNeeded;
      rq.assign.journalistNeeded=journalistNeeded;
      rq.assign.hebaNeeded=hebaNeeded;
      if(!reporterNeeded) rq.assign.reporter=null;
      if(!journalistNeeded) rq.assign.journalist=null;
      /* v7/T3: named person is assigned/unassigned directly, never via the Editorial Manager */
      rq.assign.heba = hebaNeeded ? "Heba" : null;
      rq.assign.reporterChosen = needsEditorial(rq) && editorialComplete(rq);
      state.activeReq=rq.id; state.editReq=null;
      rq.timeline.push(Object.assign(
        tlNote("requester",
          inPlace?"Updated the request (still awaiting Marketing approval).":"Edited & resubmitted the request.",
          inPlace?"عدّل الطلب (ما زال بانتظار موافقة التسويق).":"تم تعديل الطلب وإعادة إرساله.",
          note),
        diff.length?{diff}:{}));
      rq.status="marketing_approval";
      pushNoti("marketing", rq,
        inPlace?"The requester updated a request awaiting your approval.":"A revised request awaits your approval.",
        inPlace?"عدّل مقدّم الطلب طلبًا بانتظار موافقتك.":"طلب مُعدّل بانتظار موافقتك.");
      state.view="detail"; save(); render(); return;
    }
    const r=Object.assign({ id:state.seq++, requester:"requester", status:"marketing_approval", created:Date.now(),
      attachments:files,
      /* v7/T3: a named person is assigned the moment the requester picks them */
      assign:{producers:[],shooting:[],editors:[],reporterNeeded,journalistNeeded,hebaNeeded,reporterChosen:false,reporter:null,journalist:null,heba:hebaNeeded?"Heba":null},
      g1:false,g2:false,g1By:[],g2By:[],clientLink:null,comments:[],field:{},
      timeline:[tl("requester","Submitted the request.","قدّم الطلب.")] }, fields);
    state.requests.push(r);
    pushNoti("marketing", r, "New request awaiting your approval.","طلب جديد بانتظار موافقتك.");
    state.activeReq=r.id; state.view="detail"; save(); render();
  };
}

/* Blueprint §303 filter order: All · Needs your action · Awaiting approval ·
   In production · With client · Archive · Cancelled.
   Archive and Cancelled are FILTERS, not nav tabs — there is no separate Archive page. */
const FILTERS = {
  all:        rq=>!["published","cancelled"].includes(rq.status),
  approvals:  rq=>["marketing_approval","changes_requester","head_approval","changes_marketing","assign_team","journal_selection"].includes(rq.status),
  production: rq=>["in_progress","shooting","editing","internal_review","revision_routing"].includes(rq.status),
  client:     rq=>["client_version","cancellation_request","ready_to_publish"].includes(rq.status),
  archive:    rq=>rq.status==="published",
  cancelled:  rq=>rq.status==="cancelled",
};
/* ---------- Upcoming Actions ----------
   A personal agenda on the queue page: only work THIS user can act on, sorted by
   urgency. Each row = when · status dot · the action · which request · who owns it.
   Driven by the same isOwner() rule as the queue, so it can never show work that
   isn't yours (blueprint: status + assignment, never a generic list). */
function urgencyOf(rq){
  const today=todayISO();
  const d=(rq.due||"").slice(0,10);
  if(!d) return {k:"none", label:"—", hot:false};
  if(d<today)  return {k:"overdue",  label:t("overdue"),      hot:true};
  if(d===today)return {k:"today",    label:t("due_today"),    hot:true};
  const tm=new Date(Date.now()+86400000).toISOString().slice(0,10);
  if(d===tm)   return {k:"tomorrow", label:t("due_tomorrow"), hot:true};
  return {k:"later", label:fmtDay(rq.due), hot:false};
}
function upcomingCard(base, r){
  /* An AGENDA, not a to-do list: every active request this user can see, soonest
     deadline first. Rows I personally owe an action on are flagged ⚡ and shown in
     brand red; the rest are visibility ("who has it and when is it due"). `base` is
     already scoped to the role, so this can never leak other people's work. */
  const list = base
    .filter(rq=>!["published","cancelled"].includes(rq.status))
    .sort((a,b)=>String(a.due||"9999").localeCompare(String(b.due||"9999")))
    .slice(0,3);   /* top three only — no calendar view in this system */
  const rows = list.map(rq=>{
    const u=urgencyOf(rq);
    const owner=(ownersOf(rq)[0])||r;
    const ini=personName(owner).trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("");
    const isMine=isOwner(rq,r)||(r==="marketing"&&rq.changeReq);
    return `<div class="up-row" data-open="${rq.id}">
      <div class="up-when ${(u.hot||isMine)?"hot":""}">${esc(u.label)}</div>
      <span class="up-dot ${STATUS[rq.status].cls}"></span>
      <div class="up-main">
        <div class="up-act" dir="auto">${esc(statusLabel(rq.status))}${isMine?` <span class="up-flag">⚡</span>`:""}</div>
        <div class="up-sub" dir="auto">${esc(rq.title)}</div>
      </div>
      <span class="up-av" style="background:${avatarBg(owner)}" title="${esc(personName(owner))}">${esc(ini)}</span>
    </div>`;
  }).join("");
  const mine=list.filter(rq=>isOwner(rq,r)||(r==="marketing"&&rq.changeReq));
  return `<div class="card upcoming rail-card">
    <div class="up-head">
      <div class="up-title">🗓️ ${esc(t("upcoming_h"))}</div>
    </div>
    ${rows || `<div class="empty small">${esc(t("upcoming_empty"))}</div>`}
    ${mine.length?`<button class="up-foot" data-filter="mine">${esc(t("see_all_actions"))} <span class="up-cnt">${mine.length}</span> <span class="up-chev">›</span></button>`:""}
  </div>`;
}

function runDashboardAction(act,rq){
  if(!rq) return;
  const noteActions={mk_changes:"note_t_changes",hd_changes:"note_t_changes",mk_toreq:"note_t_sendback",
    r1_ch:"note_t_changes",r2_ch:"note_t_changes",cl_ch:"note_t_changes",cl_final:"note_t_final",
    cl_rej:"note_t_reject",hd_confirm_cancel:"note_t_cancel",route_ip:"note_t_route",route_sh:"note_t_route",route_ed:"note_t_route"};
  const required=["cl_rej","hd_confirm_cancel"];
  if(act==="re_resubmit"||act==="re_edit"){ state.editReq=rq.id; state.view="new"; save(); render(); return; }
  if(act==="hd_assign"){ askAssign(rq); return; }
  if(noteActions[act]){ askNote(t(noteActions[act]),(note,files)=>doAction(act,rq,note,files),required.includes(act)); return; }
  doAction(act,rq);
}

  const summary=`<div class="summary">

      <div class="k">${esc(t("f_coverage"))}</div><div class="v">${esc(covLabel(rq.coverage))}</div>

      <div class="k">${esc(t("f_event_dt"))}</div><div class="v">${esc(evWhen)}</div>
      <div class="k">${esc(t("f_delivery"))}</div><div class="v">${esc(fmtDay(rq.due))}</div>
      ${rq.locationText||rq.locationLat!=null?`<div class="k">${esc(t("f_location"))}</div><div class="v" dir="auto">${esc(rq.locationText||"—")}${locLink}</div>`:""}
      ${repRow}
      ${clientView?"":`<div class="k">${esc(t("owner_l"))}</div><div class="v">${(STATUS[rq.status].owner||[]).map(roleName).join(" / ")||"—"}</div>`}

  const actions = renderActionPanel(rq, r);

  const comments = clientView ? clientComments(rq) : commentPanel(rq);
  const timeline = clientView ? "" : timelinePanel(rq);

  /* Two-column detail: the record on the left, the workflow rail on the right.
     The rail answers "where am I / what happens next / what do I do now" without

}

function attachmentsSection(rq){
  if(!rq.attachments || !rq.attachments.length) return "";
  return `<div class="section"><h2>${esc(t("f_attach"))} <span class="muted small">(${rq.attachments.length})</span></h2>${mediaGrid(rq.attachments)}</div>`;

function mediaGrid(list, compact){
  if(!list || !list.length) return "";
  const items = list.map(a=>{
    const cap = `<span class="media-cap" dir="auto" title="${esc(a.name)}">${esc(a.name)}</span>`;
    const ty = a.type||"";
    if(a.url && ty.indexOf("image/")===0)
      return `<a class="media-item" href="${a.url}" target="_blank" rel="noopener"><img src="${a.url}" alt="${esc(a.name)}">${cap}</a>`;
    if(a.url && ty.indexOf("video/")===0)
      return `<div class="media-item"><video src="${a.url}" controls preload="metadata"></video>${cap}</div>`;
    if(a.url && ty.indexOf("audio/")===0)
      return `<div class="media-item file"><span class="media-file">🎵</span><audio src="${a.url}" controls style="width:100%"></audio>${cap}</div>`;
    const dl = a.url ? `href="${a.url}" download="${esc(a.name)}" target="_blank"` : "";
    const note = a.url ? "" : ` · <span class="muted">${esc(t("attach_toobig"))}</span>`;
    return `<a class="media-item file" ${dl}><span class="media-file">📄</span><span class="media-cap" dir="auto">${esc(a.name)} · ${esc(fmtBytes(a.size))}${note}</span></a>`;
  }).join("");
  return `<div class="media-grid${compact?" compact":""}">${items}</div>`;
}
function renderActionPanel(rq, r){
  const s=rq.status;
  let inner="";

  // Assign team (head)
  if(r==="head" && s==="assign_team"){
    inner = assignPanel(rq);
  }
  // Journal reporter selection
  else if(r==="journal" && s==="journal_selection"){
    inner = journalPanel(rq);
  }
  // Revision routing (head)
  else if(r==="head" && s==="revision_routing"){
    /* "Restart at In progress" only makes sense when the revision came from the
       CLIENT (re-plan the whole production). A change raised by an internal
       reviewer is about the material itself → Shooting or Editing only. */
    const fromReview = rq.revisionSource==="review";
    inner = `<h2>${esc(t("routing_h"))}</h2><div class="note">${esc(t("routing_note"))}</div>
      <div class="btnrow" style="margin-top:12px">
        ${fromReview?"":`<button class="btn blue" data-act="route_ip">${esc(t("restart_ip"))}</button>`}
        <button class="btn blue" data-act="route_sh">${esc(t("restart_sh"))}</button>
        <button class="btn blue" data-act="route_ed">${esc(t("restart_ed"))}</button>
      </div>`;
  }
  else {
    const btns = actionButtons(rq, r);
    if(btns){
      inner = `<div class="btnrow">${btns}</div>`;
      if(fieldGated(rq,r)) inner += `<div class="small muted" style="margin-top:8px">${esc(t("field_gate"))}</div>`;
    }
  }
  if(!inner) return "";
  return `<div class="section">${inner}</div>`;
}

function actionButtons(rq, r){
  const s=rq.status; const B=[];
  const b=(act,label,cls)=>`<button class="btn ${cls||""}" data-act="${act}">${esc(t(label))}</button>`;

  /* BUG FIX: while a change request is pending Marketing's decision the request is
     frozen — the brief may still change, so nobody may assign, start work, review,
     approve or publish against a brief that is about to move. Only Marketing
     (decide the change) and the Requester (withdraw it) may act. */
  if(rq.changeReq && r!=="marketing" && r!=="requester") return "";

  if(r==="marketing" && s==="marketing_approval"){ B.push(b("mk_approve","approve","good")); B.push(b("mk_changes","request_changes","warn")); }
  if(r==="requester" && s==="changes_requester"){ B.push(b("re_resubmit","resubmit","primary")); }
  /* v7/T2: the requester may edit their own request IN PLACE while Marketing has not
     approved yet. It disappears the moment Marketing approves — after that the
     طلب تعديل change-request flow (v6/T4) owns all changes. Requester-only; the
     edit is logged on the timeline with a before/after diff. */
  if(r==="requester" && s==="marketing_approval" && !rq.changeReq && rq.requester===r){
    B.push(b("re_edit","edit_request","primary"));
  }
  /* requester may ask to modify a request AFTER Marketing approved it — applies only if Marketing approves the change */
  if(r==="requester" && !rq.changeReq && !["marketing_approval","changes_requester","changes_marketing","cancellation_request","published","cancelled"].includes(s)){
    B.push(b("re_change","req_change","warn"));
  }
  if(r==="head" && s==="head_approval"){ B.push(b("hd_approve","approve","good")); B.push(b("hd_changes","request_changes","warn")); }
  /* assign opens the same modal from the queue row or the detail page */
  if(r==="head" && s==="assign_team"){ B.push(b("hd_assign","finalize_team","good")); }
  if(r==="marketing" && s==="changes_marketing"){ B.push(b("mk_forward","forward_head","good")); B.push(b("mk_toreq","send_requester","warn")); }
  /* v7/T4: "إنهاء المرحلة" is DELETED from the tracked stages (shooting/editing).
     There, ⏹ إنهاء العمل both stops tracking and — once the LAST required member has
     finished — advances the workflow automatically. See finishStageIfDone().
     in_progress has no per-person tracking, so it keeps one explicit action.
     ⚠️ OPEN (blueprint §912): Ahmed must confirm who/what closes Preparation. */
  if(isStaff(r) && isOwner(rq,r) && s==="in_progress"){
    B.push(b("tm_done","prep_done","primary"));
  }
  /* A reviewer keeps Approve/Request-changes until THEY personally act — even if a
     stage-mate already satisfied the stage — for as long as the request is in review.
     One approval per stage is enough to advance; a second from the same stage is optional. */
  if(isReviewer(r) && s==="internal_review"){
    const st=stageOf(r); const approvedList = st==="review1"?(rq.g1By||[]):(rq.g2By||[]);
    if(!approvedList.includes(r)){
      B.push(b(st==="review1"?"r1_ok":"r2_ok", st==="review1"?"approve_g1":"approve_g2", "good"));
      B.push(b(st==="review1"?"r1_ch":"r2_ch", "request_changes", "warn"));
    }
  }
  if(r==="client" && s==="client_version"){ B.push(b("cl_ok","client_approve","good")); B.push(b("cl_ch","client_changes","warn")); B.push(b("cl_rej","client_reject","danger")); }
  /* v7/T6: only the publisher presses نشر. Publishing just sets the status — it needs
     no article URL, video link, caption or attachment (working decision 2026-07-21). */
  if(r==="publisher" && s==="ready_to_publish"){ B.push(b("tm_publish","publish","primary")); }
  if(r==="client" && s==="ready_to_publish"){ B.push(b("cl_final","final_change","warn")); B.push(b("cl_rej","client_reject","danger")); }
  if(r==="head" && s==="cancellation_request"){ B.push(b("hd_confirm_cancel","confirm_cancel","danger")); B.push(b("hd_continue","continue_rout","good")); }

  return B.join("");
}

/* start/finish log — visible to every internal role, actionable only by the member
   themselves and only while their own stage is the current one */
function fieldPanel(rq, r){
  const members=trackedMembers(rq);
  if(!members.length) return "";
  const recs=rq.field||{};
  if(!TRACK_STAGES.includes(rq.status) && !Object.keys(recs).length) return "";
  const stamp=(labelKey,p)=> p ? `<div class="fl-line">
      <span class="fl-k">${esc(t(labelKey))}</span>
      <span class="fl-v" dir="auto">${esc(fmtDate(p.time))}</span>
      <span class="fl-coords">📍 ${esc(p.lat)}, ${esc(p.lng)}</span>
      <a href="${gmapLink(p)}" target="_blank" rel="noopener">${esc(t("view_map"))} ↗</a>
      ${p.acc!=null?`<span class="small muted">±${esc(p.acc)} m</span>`:""}
      ${p.sim?`<span class="fl-sim">${esc(t("field_sim"))}</span>`:""}
    </div>` : "";
  const rows=members.map(name=>{
    const rec=recs[name]||{};
    const isMe=(name===r);
    /* frozen while a change request is pending — the brief may still change */
    const mine=isMe&&canTrackNow(rq,name)&&!rq.changeReq;
    let chip="", btn="";
    if(rec.end){
      chip=`<span class="st done" style="padding:1px 8px">✔ ${esc(t("field_done"))}</span>`;
    }else if(rec.start){
      chip=`<span class="st work" style="padding:1px 8px">${esc(t("field_inprog"))}</span>`;
      if(mine) btn=`<button class="btn danger" data-field="end">⏹ ${esc(t("field_end"))}</button>`;
    }else{
      chip=`<span class="small muted">— ${esc(t("field_pending"))}</span>`;
      if(mine) btn=`<button class="btn good" data-field="start">▶ ${esc(t("field_start"))}</button>`;
    }
    const onStage=`<span class="small muted" dir="auto">· ${esc(statusLabel(trackStageOf(rq,name)))}</span>`;
    const dur=(rec.start&&rec.end)
      ? `<div class="fl-line"><span class="fl-k">${esc(t("field_dur"))}</span><span class="fl-v">${esc(fmtDur(rec.end.time-rec.start.time))}</span></div>` : "";
    return `<div class="fieldrow">
      <div class="fl-top">
        <span class="fl-name" dir="auto">${esc(roleName(name))}${isMe?` <span class="internal-tag">${esc(t("field_you"))}</span>`:""} ${onStage}</span>

    <h2>🛰️ ${esc(t("field_h"))}</h2>

    <div id="fieldMsg" class="small muted" style="margin-top:8px;display:none"></div>
    ${rows}
  </div>`;
}
function reviewPanel(rq){
  const line=(stage,ok,byList,gl)=>{
    const members=reviewersOfStage(stage);
    const approvers=(byList||[]);
    const pending=members.filter(m=>!approvers.includes(m));
    const status = ok
      ? `<span class="st done" style="padding:1px 8px">✔ ${esc(t(gl==="g1_l"?"g1_ok":"g2_ok"))}</span>`
      : `<span class="small muted">— ${esc(t("awaiting_g"))}</span>`;
    const who = approvers.length
      ? `<div class="small" style="color:var(--assign);font-weight:600" dir="auto">✔ ${esc(t("approved_by"))}: ${approvers.map(m=>esc(roleName(m))).join(" · ")}</div>` : "";
    /* stage already satisfied but request still in review → the other reviewer MAY still approve */
    const canStill = (ok && pending.length && rq.status==="internal_review")
      ? `<div class="small muted" dir="auto">${pending.map(m=>esc(roleName(m))).join(" · ")} — ${esc(t("may_also_approve"))}</div>` : "";
    /* lead with the GROUP, then its members underneath — clearer than four titles */
    const gname = stage==="review1" ? t("grp1_short") : t("grp2_short");
    return `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <b dir="auto">${esc(gname)}</b>${status}
      </div>
      <div class="small muted" dir="auto" style="margin-top:2px">${esc(t(gl).replace(/^.*·\s*/,""))}</div>
      <div class="small muted" dir="auto">${members.map(m=>esc(roleName(m))).join(" · ")}</div>
      ${who}${canStill}
    </div>`;
  };
  return `<div class="card rail-card">
    <div class="rail-h">${esc(t("review_groups"))}</div>
    <div class="tr-body">

    </div>
  </div>`;
}
