<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Watan — Video Production Request Workflow (Demo)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280; --line:#e3e6ec;
    --brand:#1f3a5f; --brand2:#2f5d8a;
    --approval:#6d5ac4; --changes:#d9822b; --assign:#2f9e6f; --work:#2f8f9e;
    --review:#4f63c4; --routing:#2f7fd6; --client:#5a6b8c; --done:#6f9e2f; --cancelled:#c0392b;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",Tahoma,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    font-size:14px;line-height:1.5}
  html[dir="rtl"] body{font-family:"Segoe UI","Tahoma","Cairo",system-ui,sans-serif}
  button{font-family:inherit;font-size:14px;cursor:pointer}
  a{color:var(--brand2)}
  .hidden{display:none!important}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:40;background:var(--brand);color:#fff;
    display:flex;align-items:center;gap:14px;padding:10px 18px;box-shadow:var(--shadow)}
  .topbar .logo{font-weight:700;font-size:16px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  .topbar .logo .dot{width:10px;height:10px;border-radius:50%;background:#e8b64c;display:inline-block}
  .topbar .spacer{flex:1}
  .topbar select,.topbar button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:6px 10px;border-radius:8px}
  .topbar select option{color:#111}
  .topbar .bell{position:relative}
  .badge{position:absolute;top:-6px;inset-inline-end:-6px;background:var(--cancelled);color:#fff;
    border-radius:20px;min-width:18px;height:18px;padding:0 4px;font-size:11px;display:flex;align-items:center;justify-content:center}
  .navlink{background:transparent!important;border-color:transparent!important;opacity:.85}
  .navlink.active{opacity:1;border-color:rgba(255,255,255,.5)!important;background:rgba(255,255,255,.14)!important}

  /* Layout */
  .wrap{max-width:1080px;margin:22px auto;padding:0 18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  h1{font-size:22px;margin:0 0 4px} h2{font-size:16px;margin:0 0 12px}
  .muted{color:var(--muted)} .small{font-size:12.5px}

  /* Login (professional) */
  .auth{max-width:940px;margin:14px auto 44px;padding:0 18px;display:flex;flex-direction:column;gap:18px}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 12px 34px rgba(16,24,40,.10);overflow:hidden;max-width:440px;margin:0 auto;width:100%}
  .auth-hero{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:28px 26px 24px;text-align:center}
  .auth-emblem{width:58px;height:58px;border-radius:16px;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto 12px}
  .auth-hero h1{font-size:21px;margin:0;letter-spacing:.2px}
  .auth-hero p{margin:5px 0 0;opacity:.85;font-size:12.5px}
  .auth-body{padding:24px 26px 26px}
  .field{position:relative;margin-bottom:12px}
  .field>.ic{position:absolute;inset-inline-start:13px;top:50%;transform:translateY(-50%);opacity:.5;font-size:15px;pointer-events:none}
  .field input{padding-inline-start:39px;height:46px;width:100%;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--ink);font-size:14px}
  .field input:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(47,93,138,.15)}
  .flabel{font-weight:700;font-size:12.5px;margin:2px 0 6px}
  .auth-body .btn.primary{width:100%;height:46px;font-size:15px;margin-top:6px}
  .pass-hint{margin-top:12px;font-size:12px;color:var(--muted);background:var(--bg);border:1px dashed var(--line);border-radius:9px;padding:8px 11px}

  .accounts{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 20px}
  .acct-title{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .acct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:10px;margin-top:8px}
  .acct{display:flex;align-items:center;gap:11px;text-align:start;border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;background:var(--panel);cursor:pointer;transition:.12s}
  .acct:hover{border-color:var(--brand2);box-shadow:var(--shadow);transform:translateY(-1px)}
  .avatar{width:37px;height:37px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
  .acct .nm{font-weight:700;font-size:13.5px;line-height:1.25}
  .acct .rl{font-size:11.5px;color:var(--muted)}
  .acct .un{font-family:monospace;font-size:11px;color:var(--brand2);margin-top:1px}

  /* Buttons */
  .btn{border:1px solid var(--line);background:#fff;padding:8px 14px;border-radius:9px;font-weight:600}
  .btn:hover{background:#f7f8fa}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{background:#25476f}
  .btn.good{background:var(--assign);color:#fff;border-color:var(--assign)}
  .btn.warn{background:var(--changes);color:#fff;border-color:var(--changes)}
  .btn.danger{background:var(--cancelled);color:#fff;border-color:var(--cancelled)}
  .btn.blue{background:var(--routing);color:#fff;border-color:var(--routing)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btnrow{display:flex;flex-wrap:wrap;gap:8px}

  /* Forms */
  label.f{display:block;font-weight:600;margin:12px 0 5px}
  input[type=text],input[type=date],input[type=datetime-local],input[type=email],input[type=tel],input[type=file],select.f,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:var(--panel);color:var(--ink)}
  textarea{min-height:80px;resize:vertical}
  .req-star{color:var(--cancelled)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  @media(max-width:560px){.form-grid{grid-template-columns:1fr}}
  .map-box{height:260px;border:1px solid var(--line);border-radius:11px;margin-top:6px;overflow:hidden;z-index:0}
  .map-hint{margin-top:8px}
  .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);padding:12px;text-align:center}
  .chk-row{display:flex;align-items:center;gap:10px;margin:16px 0 4px;font-weight:600;cursor:pointer;
    border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--bg)}
  .chk-row input{width:18px;height:18px}
  .role-checks{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}
  .role-check{display:flex;align-items:center;gap:8px;min-width:150px;cursor:pointer;
    border:1px solid var(--line);border-radius:11px;padding:10px 12px;background:var(--bg);font-weight:600}
  .role-check input{width:18px;height:18px}
  .attach-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .attach-chip{background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:12.5px}
  /* media gallery in a task */
  .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:6px}
  .media-item{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--bg);text-decoration:none;color:var(--ink)}
  .media-item img,.media-item video{width:100%;height:122px;object-fit:cover;display:block;background:#000}
  .media-cap{padding:6px 9px;font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .media-item.file{align-items:center;justify-content:center;padding:14px;text-align:center;gap:6px}
  .media-item.file .media-cap{white-space:normal}
  .media-file{font-size:30px}
  :root[data-theme="dark"] input[type=file]{color:var(--ink)}

  /* List */
  .list-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .reqrow{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .reqrow:last-child{border-bottom:none}
  .reqrow:hover{background:#f9fafb}
  .reqrow .idcol{font-weight:700;color:var(--brand2);min-width:104px;font-family:monospace;font-size:12.5px;padding-top:2px}
  .refchip{font-family:monospace;font-weight:700;color:var(--brand2);letter-spacing:.3px}
  .reqrow .main{flex:1}
  .reqrow .t{font-weight:700;font-size:15px}
  .actionflag{background:#fff4e5;color:#b4620a;border:1px solid #f3d3ab;border-radius:20px;
    padding:2px 10px;font-size:11.5px;font-weight:700;white-space:nowrap}

  /* Status badge */
  .st{display:inline-flex;align-items:center;gap:6px;color:#fff;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
  .st::before{content:"";width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.85)}
  .st.approval{background:var(--approval)} .st.changes{background:var(--changes)}
  .st.assign{background:var(--assign)} .st.work{background:var(--work)}
  .st.review{background:var(--review)} .st.routing{background:var(--routing)}
  .st.client{background:var(--client)} .st.done{background:var(--done)} .st.cancelled{background:var(--cancelled)}

  /* Detail */
  .summary{padding:18px 20px}
  .sum-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;margin-top:12px}
  .kv .k{color:var(--muted);font-size:12.5px} .kv .v{font-weight:600}
  .section{padding:16px 20px;border-top:1px solid var(--line)}
  .brief{background:#f7f8fa;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:12px}

  /* Stepper */
  .stepper{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px}
  .step{flex:1;min-width:78px;text-align:center;font-size:11px;color:var(--muted);position:relative}
  .step .num{width:26px;height:26px;border-radius:50%;background:#e6e9ef;color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 5px}
  .step.on .num{background:var(--brand);color:#fff}
  .step.done .num{background:var(--assign);color:#fff}

  /* Timeline */
  .tl{list-style:none;margin:12px 0 0;padding:0}
  .tl li{position:relative;padding-inline-start:20px;padding-bottom:14px}
  .tl li::before{content:"";position:absolute;inset-inline-start:4px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--brand2)}
  .tl li::after{content:"";position:absolute;inset-inline-start:8px;top:14px;bottom:0;width:1px;background:var(--line)}
  .tl li:last-child::after{display:none}
  .tl .who{font-weight:700;font-size:12.5px}
  .tl .tm{color:var(--muted);font-size:11.5px}

  /* comments */
  .cmt{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#fff}
  .cmt .h{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .internal-tag{background:#eef;color:#4152c4;border-radius:6px;padding:1px 6px;font-size:10.5px;font-weight:700}

  /* pick chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .chip{border:1px solid var(--line);border-radius:20px;padding:6px 12px;background:#fff;user-select:none}
  .chip.sel{background:var(--assign);color:#fff;border-color:var(--assign)}

  .note{background:#fbfbe8;border:1px solid #e8e7bd;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#6b6a2a}
  .linkbox{background:#eef4fb;border:1px dashed #9dbbe0;border-radius:8px;padding:8px 10px;font-family:monospace;font-size:12px;word-break:break-all;color:#274b74}

  /* notifications dropdown */
  .noti-pop{position:absolute;inset-inline-end:0;top:44px;width:340px;max-height:420px;overflow-y:auto;background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(16,24,40,.22);z-index:50}
  .noti-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0}
  .noti-actions{display:flex;gap:6px;flex-wrap:wrap}
  .noti-btn{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-size:11px;color:var(--ink);cursor:pointer}
  .noti-btn.danger{color:var(--cancelled);border-color:var(--cancelled)}
  .noti-item{position:relative;padding:11px 14px;padding-inline-end:32px;border-bottom:1px solid var(--line)}
  .noti-item:hover{background:var(--bg)}
  .noti-item.unread{background:rgba(47,127,214,.08)}
  .noti-x{position:absolute;inset-inline-end:8px;top:9px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;cursor:pointer}
  .noti-x:hover{background:var(--line);color:var(--ink)}
  .empty{padding:30px;text-align:center;color:var(--muted)}

  /* segmented toggle + icon buttons (top bar) */
  .seg{display:inline-flex;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;border:none;color:#fff;padding:6px 11px;opacity:.72;font-weight:600}
  .seg button.on{background:rgba(255,255,255,.24);opacity:1;font-weight:800}
  .icon-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:8px;padding:6px 10px}

  /* dashboard filter tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--muted);padding:7px 13px;border-radius:20px;font-weight:600}
  .tab:hover{border-color:var(--brand2)}
  .tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .tab .cnt{opacity:.7;font-size:11px;margin-inline-start:6px}

  /* guidance card */
  .guide{margin:0 0 14px;border:1px solid var(--line);border-inline-start:4px solid var(--brand2);border-radius:12px;background:var(--panel);padding:14px 16px;box-shadow:var(--shadow)}
  .guide .lead{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .guide .grow{margin-top:9px;display:flex;gap:10px;align-items:flex-start}
  .guide .tagk{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);min-width:78px;padding-top:2px}
  .guide.you{border-inline-start-color:var(--assign)}
  .guide.wait{border-inline-start-color:var(--changes)}
  .guide .youdo{color:var(--assign);font-weight:700}

  /* dark theme */
  :root[data-theme="dark"]{
    --bg:#0e131b; --panel:#161d28; --ink:#e6e9ef; --muted:#93a0b2; --line:#2a3442;
    --brand:#182739; --brand2:#5f95d0; --shadow:0 1px 3px rgba(0,0,0,.45);
  }
  :root[data-theme="dark"] .btn{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] .btn:hover{background:#243040}
  :root[data-theme="dark"] input,:root[data-theme="dark"] textarea,:root[data-theme="dark"] select.f{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] .brief,:root[data-theme="dark"] .role-card,:root[data-theme="dark"] .cmt,:root[data-theme="dark"] .modal,:root[data-theme="dark"] .noti-pop{background:#1b2431}
  :root[data-theme="dark"] .reqrow:hover{background:#1b2431}
  :root[data-theme="dark"] .role-card .ic{background:#232e3d}
  :root[data-theme="dark"] .chip{background:#1e2733;color:var(--ink);border-color:var(--line)}
  :root[data-theme="dark"] .note{background:#2a2a18;border-color:#4a4a2a;color:#d9d9a0}
  :root[data-theme="dark"] .tl-note{background:#2a2013;border-color:#5a4020;color:#e8c48a}
  :root[data-theme="dark"] .linkbox{background:#14243a;border-color:#2f5480;color:#a9c8ee}
  :root[data-theme="dark"] .actionflag{background:#3a2a10;border-color:#5c4420;color:#f0b969}
  :root[data-theme="dark"] .noti-item.unread{background:#12243c}
  :root[data-theme="dark"] .internal-tag{background:#25306a;color:#c9d2ff}

  /* timeline note */
  .tl-note{background:#fff7ed;border:1px solid #f3d3ab;border-radius:8px;padding:7px 10px;margin-top:5px;font-size:12.5px;color:#8a4b0a}

  /* modal */
  .modal-ov{position:fixed;inset:0;background:rgba(16,24,40,.45);display:flex;align-items:center;justify-content:center;z-index:80;padding:18px}
  .modal{background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(16,24,40,.28);padding:20px 22px;width:100%;max-width:440px}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="app"></div>

<script>
/* ============================================================
   Al Watan — Video Production Request Workflow  (clickable demo)
   Single file · vanilla JS · localStorage · bilingual EN/AR (RTL)
   ============================================================ */

const LS_KEY = "watan_demo_v1";

/* ---------- i18n dictionary ---------- */
const DICT = {
  app_title:      {en:"Video Production Request Workflow", ar:"سير عمل طلبات إنتاج الفيديو"},
  demo_tag:       {en:"Demo", ar:"عرض تجريبي"},
  sys_name:       {en:"Video Production Request System", ar:"نظام إدارة طلبات إنتاج الفيديو"},
  login_title:    {en:"Sign in", ar:"تسجيل الدخول"},
  login_sub:      {en:"Enter your username and password, or click an account below to fill it in.",
                   ar:"أدخل اسم المستخدم وكلمة المرور، أو انقر حسابًا بالأسفل لتعبئتهما."},
  username:       {en:"Username", ar:"اسم المستخدم"},
  password:       {en:"Password", ar:"كلمة المرور"},
  sign_in:        {en:"Sign in", ar:"دخول"},
  quick_login:    {en:"Demo accounts — click one to fill the form", ar:"حسابات تجريبية — انقر أحدها لتعبئة النموذج"},
  demo_pass_hint: {en:"Demo password for every account: demo123", ar:"كلمة مرور العرض لكل الحسابات: demo123"},
  bad_creds:      {en:"Wrong username or password.", ar:"اسم المستخدم أو كلمة المرور غير صحيحة."},
  switch_user:    {en:"Switch user", ar:"تبديل المستخدم"},
  logout:         {en:"Log out", ar:"خروج"},
  reset:          {en:"Reset demo", ar:"إعادة تعيين"},
  nav_requests:   {en:"Requests", ar:"الطلبات"},
  nav_new:        {en:"New request", ar:"طلب جديد"},
  nav_archive:    {en:"Archive", ar:"الأرشيف"},
  notifications:  {en:"Notifications", ar:"الإشعارات"},
  no_noti:        {en:"No notifications", ar:"لا توجد إشعارات"},
  mark_read:      {en:"Mark all read", ar:"تعليم الكل كمقروء"},
  clear_all:      {en:"Clear all", ar:"مسح الكل"},
  mute_noti:      {en:"Mute", ar:"كتم"},
  unmute_noti:    {en:"Unmute", ar:"إلغاء الكتم"},
  action_needed:  {en:"Action needed", ar:"إجراء مطلوب"},

  /* new request form */
  new_h:          {en:"New video production request", ar:"طلب إنتاج فيديو جديد"},
  smartform_note: {en:"Smart form: required fields are enforced — the request arrives 100% complete, so no send-back for missing info.",
                   ar:"نموذج ذكي: الحقول المطلوبة إلزامية — يصل الطلب مكتملًا 100%، فلا إرجاع بسبب نقص المعلومات."},
  f_title:        {en:"Event name", ar:"اسم الفعالية"},
  f_client:       {en:"Client name", ar:"اسم العميل"},
  f_select_client:{en:"Select existing client", ar:"اختر عميلًا موجودًا"},
  client_pick_none:{en:"— Select a client —", ar:"— اختر عميلًا —"},
  select_client_hint:{en:"Pick a client to auto-fill their details, or type a new one below.",
                      ar:"اختر عميلًا لتعبئة بياناته تلقائيًا، أو اكتب عميلًا جديدًا بالأسفل."},
  f_contact:      {en:"Responsible person", ar:"الشخص المسؤول"},
  f_phone:        {en:"Phone", ar:"الهاتف"},
  f_email:        {en:"Email", ar:"الإيميل"},
  f_event_date:   {en:"Event date", ar:"تاريخ الفعالية"},
  f_coverage:     {en:"Coverage type", ar:"نوع التغطية"},

function kindOf(id){ if(ROLES.includes(id)) return id; return (typeof STAFF!=="undefined" && STAFF[id]) ? STAFF[id] : "staff"; }

function roleName(r){
  if(ROLE_LABEL[r]) return ROLE_LABEL[r][state.lang];
  const k = kindOf(r);
  return KIND_LABEL[k] ? (r+" · "+KIND_LABEL[k][state.lang]) : r;
}

}

/* ---------- helpers ---------- */
// force Western/Latin digits even if Arabic-Indic (٠-٩ / ۰-۹) is entered or produced by the locale
function toLatinDigits(s){
  return String(s==null?"":s)
    .replace(/[٠-٩]/g,d=>String(d.charCodeAt(0)-0x0660))
    .replace(/[۰-۹]/g,d=>String(d.charCodeAt(0)-0x06F0));
}
function esc(s){ return toLatinDigits(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Arabic month names but always Latin numerals (…-u-nu-latn)
function fmtDate(ts){ const d=new Date(ts); return d.toLocaleString(state.lang==="ar"?"ar-BH-u-nu-latn":"en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
function fmtDay(s){ if(!s) return "—"; const d=new Date(s); return d.toLocaleDateString(state.lang==="ar"?"ar-BH-u-nu-latn":"en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function todayISO(){ const d=new Date(); const l=new Date(d.getTime()-d.getTimezoneOffset()*60000); return l.toISOString().slice(0,10); }
function refOf(rq){ return "VPR-"+new Date(rq.created).getFullYear()+"-"+String(rq.id).padStart(4,"0"); }
function reqById(id){ return state.requests.find(r=>r.id===id); }
function needsEditorial(req){ return !!(req && req.assign && (req.assign.reporterNeeded || req.assign.journalistNeeded)); }
function myRole(){ return state.currentUser; }
function isOwner(req, uid){
  const kinds = STATUS[req.status].owner || [];
  const k = kindOf(uid);
  if(!kinds.includes(k)) return false;
  if(k==="producer") return req.assign.producers.includes(uid);
  if(k==="editor")   return req.assign.editors.includes(uid);
  if(k==="reporter") return req.assign.reporter===uid;
  return true; // org roles
}
// resolve current owners of a request to concrete user ids (for notifications)
function ownersOf(req){
  const out=[];
  (STATUS[req.status].owner||[]).forEach(k=>{
    if(k==="producer") out.push(...req.assign.producers);
    else if(k==="editor") out.push(...req.assign.editors);
    else if(k==="reporter"){ if(req.assign.reporter) out.push(req.assign.reporter); }
    else out.push(k);
  });
  return [...new Set(out)];
}
function notifyOwners(req,en,ar){ ownersOf(req).forEach(uid=>pushNoti(uid,req,en,ar)); }
function ownerLabel(req){
  const ids = ownersOf(req);
  if(ids.length) return ids.map(roleName).join(" / ");
  return (STATUS[req.status].owner||[]).map(k=>ROLE_LABEL[k]?ROLE_LABEL[k][state.lang]:(KIND_LABEL[k]?KIND_LABEL[k][state.lang]:k)).join(" / ")||"—";
}
function guidanceCard(req, role){
  const g=STAGE_GUIDE[req.status]; if(!g) return "";
  const done = req.status==="published"||req.status==="cancelled";
  const mine = isOwner(req, role);
  const isClient = role==="client";
  let cls = done ? "" : (mine ? "you" : "wait");
  let todoRow="";
  if(!done){
    let todo;
    if(mine) todo = `<span class="youdo">➡ ${esc(g.o[state.lang])}</span>`;
    else if(isClient) todo = `<span class="muted">${esc(t("g_client_wait"))}</span>`;
    else todo = `<span class="muted">${esc(t("g_waiting"))}: <b>${esc(ownerLabel(req))}</b></span>`;
    todoRow = `<div class="grow"><span class="tagk">${esc(t("g_todo"))}</span>${todo}</div>`;
  }
  const nextRow = (!isClient && g.n[state.lang]!=="—")
    ? `<div class="grow"><span class="tagk">${esc(t("g_next"))}</span><span dir="auto">${esc(g.n[state.lang])}</span></div>` : "";
  return `<div class="guide ${cls}">
     <div class="lead">📍 ${esc(statusLabel(req.status))}</div>
     <div class="grow"><span class="tagk">${esc(t("g_here"))}</span><span dir="auto">${esc(g.d[state.lang])}</span></div>
     ${nextRow}
     ${todoRow}
   </div>`;
}
function unreadCount(){ const r=myRole(); return state.notifications.filter(n=>n.role===r && !n.read).length; }
function addTl(req,en,ar,note){ req.timeline.push(tlNote(myRole(),en,ar,note)); }
function pushNoti(role,req,en,ar){ state.notifications.push(noti(role,req.id,en,ar)); }

function render(){
  document.documentElement.lang = state.lang;
  document.documentElement.dir  = state.lang==="ar" ? "rtl" : "ltr";
  document.documentElement.dataset.theme = state.theme || "light";
  renderTopbar();
  const app = document.getElementById("app");
  if(!state.currentUser){ app.innerHTML = viewLogin(); bindLogin(); return; }
  if(state.view==="new"){ app.innerHTML = viewNew(); bindNew(); return; }
  if(state.view==="detail"){ app.innerHTML = viewDetail(); bindDetail(); return; }
  if(state.view==="archive"){ app.innerHTML = viewList(true); bindList(); return; }
  app.innerHTML = viewList(false); bindList();
}

function notiPop(){

  const mine=state.notifications.filter(n=>n.role===r).slice().reverse();

     <b>${esc(t("notifications"))}</b>
     <span class="noti-actions">
       <button class="noti-btn" id="muteBtn">${state.muted?("🔕 "+esc(t("unmute_noti"))):("🔔 "+esc(t("mute_noti")))}</button>
       ${mine.length?`<button class="noti-btn" id="markReadBtn">${esc(t("mark_read"))}</button>
       <button class="noti-btn danger" id="clearAllBtn">${esc(t("clear_all"))}</button>`:""}
     </span>
   </div>`;
  const body = !mine.length
    ? `<div class="empty">${esc(t("no_noti"))}</div>`
    : mine.map(n=>{ const rq=reqById(n.reqId);
        return `<div class="noti-item ${n.read?"":"unread"}">

          </div>
        </div>`;
      }).join("");
  return `<div class="noti-pop">${head}${body}</div>`;
}

function bindLogin(){
  const err=document.getElementById("lg_err");
  const doLogin=()=>{
    const u=document.getElementById("lg_user").value;
    const p=document.getElementById("lg_pass").value;
    const id=findUserByCreds(u,p);
    if(!id){ err.textContent=t("bad_creds"); return; }
    state.currentUser=id; state.view="list"; state.filter="all"; save(); render();
  };
  document.getElementById("lg_btn").onclick=doLogin;
  document.getElementById("lg_pass").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  document.querySelectorAll("[data-fill]").forEach(b=>b.onclick=()=>{
    document.getElementById("lg_user").value=b.dataset.fill;
    document.getElementById("lg_pass").value=DEMO_PASS;
    err.textContent="";
    document.getElementById("lg_btn").focus();
  });
}

function viewNew(){

let _formLoc = {lat:null,lng:null};
let _leafMap=null, _leafMarker=null, _setCoordsFn=null;
function initFormMap(rq){
  const el=document.getElementById("n_map"); if(!el) return;
  _formLoc = (rq && rq.locationLat!=null) ? {lat:rq.locationLat,lng:rq.locationLng} : {lat:null,lng:null};
  _leafMap=null; _leafMarker=null;
  const coordsEl=document.getElementById("n_coords");
  const setCoords=(lat,lng)=>{ _formLoc={lat:+lat.toFixed(5),lng:+lng.toFixed(5)}; if(coordsEl) coordsEl.textContent=`📍 ${_formLoc.lat}, ${_formLoc.lng}`; };
  _setCoordsFn=setCoords;
  if(typeof L==="undefined"){
    el.innerHTML=`<div class="map-fallback">${esc(state.lang==="ar"?"الخريطة غير متاحة دون اتصال — استخدم حقل النص.":"Map unavailable offline — use the text field above.")}</div>`;
    return;
  }
  const sLat = _formLoc.lat!=null?_formLoc.lat:26.2285, sLng=_formLoc.lng!=null?_formLoc.lng:50.586;
  const map=L.map(el).setView([sLat,sLng], _formLoc.lat!=null?14:10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  _leafMarker = _formLoc.lat!=null ? L.marker([sLat,sLng]).addTo(map) : null;
  if(_formLoc.lat!=null) setCoords(sLat,sLng);
  map.on('click', e=>{
    if(_leafMarker) _leafMarker.setLatLng(e.latlng); else _leafMarker=L.marker(e.latlng).addTo(map);
    setCoords(e.latlng.lat, e.latlng.lng);
  });
  _leafMap=map;
  setTimeout(()=>map.invalidateSize(), 80);
}
function formSetLocation(lat,lng){
  if(_setCoordsFn) _setCoordsFn(lat,lng);
  if(_leafMap){
    if(_leafMarker) _leafMarker.setLatLng([lat,lng]); else _leafMarker=L.marker([lat,lng]).addTo(_leafMap);
    _leafMap.setView([lat,lng],14);
  }
}
// read uploaded files → {name,size,type,url}. Embed the data URL for smaller files
// so it can be previewed and survive a reload (localStorage has limited space).
const EMBED_LIMIT = 2600000; // ~2.6 MB
function readFiles(fileList){
  return Promise.all([...fileList].map(f=>new Promise(res=>{
    const meta={name:f.name, size:f.size, type:f.type||""};
    if(f.size>EMBED_LIMIT){ res(meta); return; }
    const r=new FileReader();
    r.onload=()=>{ meta.url=r.result; res(meta); };
    r.onerror=()=>res(meta);
    r.readAsDataURL(f);
  })));
}
function bindNew(){
  const rqEdit = state.editReq ? reqById(state.editReq) : null;
  initFormMap(rqEdit);
  const cp=document.getElementById("n_clientPick");
  if(cp) cp.onchange=()=>{
    const c=CLIENTS[+cp.value]; if(!c) return;
    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||""; };
    set("n_client",c.name); set("n_contact",c.contact); set("n_phone",c.phone);
    set("n_email",c.email); set("n_locationText",c.location);
    if(c.lat!=null) formSetLocation(c.lat,c.lng);
  };
  document.getElementById("n_cancel").onclick=()=>{ state.editReq=null; state.view="list"; save(); render(); };
  document.getElementById("n_submit").onclick=async ()=>{
    const g=id=>{const el=document.getElementById(id); return el?el.value.trim():"";};
    const err=document.getElementById("n_err");
    const title=g("n_title"), client=g("n_client"), due=g("n_due");
    const coverage=document.getElementById("n_coverage").value, eventType=document.getElementById("n_eventType").value;
    const contact=g("n_contact"), phone=g("n_phone"), email=g("n_email");
    const eventDate=g("n_eventDate"), eventDateTime=g("n_eventDateTime");
    const locationText=g("n_locationText"), notes=g("n_notes");
    const reporterNeeded=document.getElementById("n_reporter").checked;
    const journalistNeeded=document.getElementById("n_journalist").checked;
    const files=await readFiles(document.getElementById("n_attach").files||[]);
    if(!title||!client||!due){
      err.textContent = state.lang==="ar"?"الرجاء تعبئة الحقول المطلوبة (*).":"Please fill the required fields (*).";
      return;
    }
    const past=d=> d && d.slice(0,10) < todayISO();
    if(past(due)||past(eventDate)||past(eventDateTime)){
      err.textContent = state.lang==="ar"?"لا يمكن اختيار تاريخ قبل اليوم.":"Dates cannot be earlier than today.";
      return;
    }
    const fields={ title,client,contact,phone,email,eventDate,eventDateTime,coverage,eventType,
      due,locationText,locationLat:_formLoc.lat,locationLng:_formLoc.lng,notes };

    if(state.editReq){
      const rq=reqById(state.editReq); const note=g("n_note");
      Object.assign(rq, fields);
      rq.attachments=(rq.attachments||[]).concat(files);
      rq.assign.reporterNeeded=reporterNeeded;
      rq.assign.journalistNeeded=journalistNeeded;
      if(!needsEditorial(rq)){ rq.assign.reporterChosen=false; rq.assign.reporter=null; }
      state.activeReq=rq.id; state.editReq=null;
      const cu=state.currentUser; state.currentUser="requester";
      addTl(rq,"Edited & resubmitted the request.","تم تعديل الطلب وإعادة إرساله.",note);
      state.currentUser=cu;
      rq.status="marketing_approval";
      pushNoti("marketing", rq, "A revised request awaits your approval.","طلب مُعدّل بانتظار موافقتك.");
      state.view="detail"; save(); render(); return;
    }
    const r=Object.assign({ id:state.seq++, requester:"requester", status:"marketing_approval", created:Date.now(),
      attachments:files,
      assign:{producers:[],editors:[],reporterNeeded,journalistNeeded,reporterChosen:false,reporter:null},
      g1:false,g2:false,clientLink:null,comments:[],
      timeline:[tl("requester","Submitted the request.","قدّم الطلب.")] }, fields);
    state.requests.push(r);
    pushNoti("marketing", r, "New request awaiting your approval.","طلب جديد بانتظار موافقتك.");
    state.activeReq=r.id; state.view="detail"; save(); render();
  };
}

  approvals:  rq=>["marketing_approval","changes_requester","head_approval","changes_marketing","assign_team","journal_selection"].includes(rq.status),
  production: rq=>["in_progress","shooting","editing","internal_review","revision_routing"].includes(rq.status),

function viewList(archive){
  const r=myRole();

  else        base=base.filter(x=>x.status!=="published"&&x.status!=="cancelled");
  // client sees only requests that reached client stage
  if(r==="client") base=base.filter(x=>["client_version","ready_to_publish","published","cancelled"].includes(x.status));
  // staff see only requests they are assigned to
  if(isStaff(r)) base=base.filter(x=>x.assign.producers.includes(r)||x.assign.editors.includes(r)||x.assign.reporter===r);

  // status filter tabs (active list only)
  let tabsHtml="";
  if(!archive){
    const defs=[["all","tab_all"],["mine","tab_mine"],["approvals","tab_approvals"],["production","tab_production"],["client","tab_client"]];
    const test=k=> k==="mine" ? (rq=>isOwner(rq,r)) : FILTERS[k];

    tabsHtml=`<div class="tabs">`+defs.map(([k,lbl])=>{
      const c=base.filter(test(k)).length;
      return `<button class="tab ${state.filter===k?"on":""}" data-filter="${k}">${esc(t(lbl))}<span class="cnt">${c}</span></button>`;
    }).join("")+`</div>`;
  }

  let rows = archive ? base : base.filter(test(state.filter));

  const title = archive? t("nav_archive"): t("nav_requests");

    body=`<div class="empty">${esc(archive?t("archived_empty"):t("no_requests"))}</div>`;

    }).join("");
  }

function attachmentsSection(rq){
  if(!rq.attachments || !rq.attachments.length) return "";
  const items = rq.attachments.map(a=>{
    const cap = `<span class="media-cap" dir="auto" title="${esc(a.name)}">${esc(a.name)}</span>`;

      return `<a class="media-item" href="${a.url}" target="_blank" rel="noopener"><img src="${a.url}" alt="${esc(a.name)}">${cap}</a>`;
    if(a.url && ty.indexOf("video/")===0)
      return `<div class="media-item"><video src="${a.url}" controls preload="metadata"></video>${cap}</div>`;
    if(a.url && ty.indexOf("audio/")===0)
      return `<div class="media-item file"><span class="media-file">🎵</span><audio src="${a.url}" controls style="width:100%"></audio>${cap}</div>`;
    const dl = a.url ? `href="${a.url}" download="${esc(a.name)}" target="_blank"` : "";
    const note = a.url ? "" : ` · <span class="muted">${esc(t("attach_toobig"))}</span>`;
    return `<a class="media-item file" ${dl}><span class="media-file">📄</span><span class="media-cap" dir="auto">${esc(a.name)} · ${esc(fmtBytes(a.size))}${note}</span></a>`;
  }).join("");
  return `<div class="section"><h2>${esc(t("f_attach"))} <span class="muted small">(${rq.attachments.length})</span></h2><div class="media-grid">${items}</div></div>`;
}

function actionButtons(rq, r){
  const s=rq.status; const B=[];
  const b=(act,label,cls)=>`<button class="btn ${cls||""}" data-act="${act}">${esc(t(label))}</button>`;

  if(r==="marketing" && s==="marketing_approval"){ B.push(b("mk_approve","approve","good")); B.push(b("mk_changes","request_changes","warn")); }
  if(r==="requester" && s==="changes_requester"){ B.push(b("re_resubmit","resubmit","primary")); }
  if(r==="head" && s==="head_approval"){ B.push(b("hd_approve","approve","good")); B.push(b("hd_changes","request_changes","warn")); }
  if(r==="marketing" && s==="changes_marketing"){ B.push(b("mk_forward","forward_head","good")); B.push(b("mk_toreq","send_requester","warn")); }
  if(isStaff(r) && isOwner(rq,r) && ["in_progress","shooting","editing"].includes(s)){ B.push(b("tm_done","mark_done","primary")); }
  if(r==="review1" && s==="internal_review"){ if(!rq.g1) B.push(b("r1_ok","approve_g1","good")); B.push(b("r1_ch","request_changes","warn")); }
  if(r==="review2" && s==="internal_review"){ if(!rq.g2) B.push(b("r2_ok","approve_g2","good")); B.push(b("r2_ch","request_changes","warn")); }
  if(r==="client" && s==="client_version"){ B.push(b("cl_ok","client_approve","good")); B.push(b("cl_ch","client_changes","warn")); B.push(b("cl_rej","client_reject","danger")); }
  if(isStaff(r) && isOwner(rq,r) && s==="ready_to_publish"){ B.push(b("tm_publish","publish","primary")); }
  if(r==="client" && s==="ready_to_publish"){ B.push(b("cl_final","final_change","warn")); B.push(b("cl_rej","client_reject","danger")); }
  if(r==="head" && s==="cancellation_request"){ B.push(b("hd_confirm_cancel","confirm_cancel","danger")); B.push(b("hd_continue","continue_rout","good")); }

  return B.join("");
}

/* ---------- Detail bindings / actions ---------- */
function bindDetail(){
  const rq=reqById(state.activeReq); const r=myRole();
  document.getElementById("backBtn").onclick=()=>{ state.view="list"; save(); render(); };

  // generic action buttons (some require a note tied to the action)
  const NOTE_ACTIONS={mk_changes:"note_t_changes",hd_changes:"note_t_changes",mk_toreq:"note_t_sendback",
    r1_ch:"note_t_changes",r2_ch:"note_t_changes",cl_ch:"note_t_changes",cl_final:"note_t_final",
    cl_rej:"note_t_reject",hd_confirm_cancel:"note_t_cancel",route_ip:"note_t_route",route_sh:"note_t_route",route_ed:"note_t_route"};
  const REQUIRED=["cl_rej","hd_confirm_cancel"];
  document.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>{
    const act=el.dataset.act;
    if(act==="re_resubmit"){ state.editReq=rq.id; state.view="new"; save(); render(); return; }
    if(NOTE_ACTIONS[act]){ askNote(t(NOTE_ACTIONS[act]), n=>doAction(act,rq,n), REQUIRED.includes(act)); return; }
    doAction(act, rq);
  });

  // assign chips
  document.querySelectorAll("[data-pick]").forEach(el=>el.onclick=()=>{
    const [key,name]=el.dataset.pick.split("|");
    const arr=rq.assign[key]; const i=arr.indexOf(name);
    if(i>=0) arr.splice(i,1); else arr.push(name);
    save(); render();
  });
  const rn=document.getElementById("repNeeded");
  if(rn) rn.onchange=()=>{ rq.assign.reporterNeeded=rn.checked; rq.assign.journalistNeeded=false; if(!rn.checked){rq.assign.reporterChosen=false;rq.assign.reporter=null;} save(); render(); };
  const rj=document.getElementById("reqJournal");
  if(rj) rj.onclick=()=>{
    addTl(rq,"Requested a reporter/presenter from the Editorial Manager (copy to zalmushaigri@alwatannews.net).",
             "طلب مراسلًا/مقدّمًا من مسؤول المحررين (نسخة إلى zalmushaigri@alwatannews.net).");
    rq.status="journal_selection";
    pushNoti("journal", rq, "A reporter/presenter selection is requested.","مطلوب اختيار مراسل/مقدّم.");
    save(); render();
  };
  const ft=document.getElementById("finalizeTeam");
  if(ft) ft.onclick=()=>{
    if(!rq.assign.producers.length || !rq.assign.editors.length){
      alert(state.lang==="ar"?"اختر منتجًا واحدًا ومونتيرًا واحدًا على الأقل.":"Pick at least one producer and one editor."); return;
    }
    addTl(rq,"Finalized the team — production started.","تم اعتماد الفريق — بدأ الإنتاج.");
    rq.status="in_progress";
    notifyOwners(rq,"You've been assigned — your stage (In progress) is ready.","تم تعيينك — مرحلتك (قيد التنفيذ) جاهزة.");
    save(); render();
  };

  // journal reporter pick
  document.querySelectorAll("[data-rep]").forEach(el=>el.onclick=()=>{
    rq.assign.reporter=el.dataset.rep; save(); render();
  });
  const cr=document.getElementById("confirmRep");
  if(cr) cr.onclick=()=>{
    rq.assign.reporterChosen=true;
    addTl(rq,"Selected reporter/presenter: "+rq.assign.reporter+".","تم اختيار المراسل/المقدّم: "+rq.assign.reporter+".");
    rq.status="assign_team";
    pushNoti("head", rq, "Reporter selected — finalize the team.","تم اختيار المراسل — اعتمد الفريق.");
    save(); render();
  };

  // comments
  const ca=document.getElementById("cmtAdd");
  if(ca) ca.onclick=()=>{
    const box=document.getElementById("cmtBox"); const txt=box.value.trim(); if(!txt) return;
    rq.comments.push({role:r, text:txt, time:Date.now(), internal: r!=="client"});
    save(); render();
  };
}

function doAction(act, rq, note){
  switch(act){
    case "mk_approve":
      addTl(rq,"Approved — moved to Head approval.","موافقة — أُحيل لموافقة الرئيس.");
      rq.status="head_approval"; pushNoti("head",rq,"A request awaits your approval.","طلب بانتظار موافقتك."); break;
    case "mk_changes":
      addTl(rq,"Requested changes — sent back to Requester.","طلب تعديلات — أُعيد لمقدم الطلب.",note);
      rq.status="changes_requester"; pushNoti("requester",rq,"Your request needs changes.","طلبك يحتاج إلى تعديلات."); break;
    case "hd_approve":
      addTl(rq,"Approved — moved to Assign team.","موافقة — الانتقال لتعيين الفريق.");
      rq.status="assign_team"; break; // head himself acts next
    case "hd_changes":
      addTl(rq,"Requested changes — sent to Marketing (comment visible to Requester).","طلب تعديلات — أُرسل للتسويق (التعليق مرئي لمقدم الطلب).",note);
      rq.status="changes_marketing";
      pushNoti("marketing",rq,"Head requested changes.","طلب الرئيس تعديلات.");
      pushNoti("requester",rq,"Head left a change comment on your request.","ترك الرئيس تعليق تعديل على طلبك."); break;
    case "mk_forward":
      addTl(rq,"Fixed & forwarded to Head approval.","تم التعديل والإرسال لموافقة الرئيس.");
      rq.status="head_approval"; pushNoti("head",rq,"A request awaits your approval.","طلب بانتظار موافقتك."); break;
    case "mk_toreq":
      addTl(rq,"Sent back to Requester.","أُعيد لمقدم الطلب.",note);
      rq.status="changes_requester"; pushNoti("requester",rq,"Your request needs changes.","طلبك يحتاج إلى تعديلات."); break;
    case "tm_done": {
      const next = rq.status==="in_progress"?"shooting":(rq.status==="shooting"?"editing":"internal_review");
      if(next==="internal_review"){
        rq.g1=false; rq.g2=false;
        addTl(rq,"Editing done — sent to internal review.","انتهى المونتاج — أُرسل للمراجعة الداخلية.");
        rq.status="internal_review";
        pushNoti("review1",rq,"A request awaits internal review.","طلب بانتظار المراجعة الداخلية.");
        pushNoti("review2",rq,"A request awaits internal review.","طلب بانتظار المراجعة الداخلية.");
      }else{
        addTl(rq,"Stage completed — moved to "+statusLabel(next)+".","اكتملت المرحلة — الانتقال إلى "+statusLabel(next)+".");
        rq.status=next; notifyOwners(rq,"Next production stage is assigned to you.","المرحلة التالية مُسنَدة إليك.");
      }
      break; }
    case "r1_ok":
      rq.g1=true; addTl(rq,"Group 1 approved.","وافقت المجموعة ١."); checkReviewComplete(rq); break;
    case "r2_ok":
      rq.g2=true; addTl(rq,"Group 2 approved.","وافقت المجموعة ٢."); checkReviewComplete(rq); break;
    case "r1_ch": case "r2_ch":
      rq.g1=false; rq.g2=false;
      addTl(rq,"Requested changes — routed to Production Head.","طلب تعديلات — أُحيل لرئيس الإنتاج.",note);
      rq.status="revision_routing"; pushNoti("head",rq,"Internal review requested changes — pick restart stage.","طلبت المراجعة تعديلات — اختر مرحلة الاستئناف."); break;
    case "route_ip": case "route_sh": case "route_ed": {
      const map={route_ip:"in_progress",route_sh:"shooting",route_ed:"editing"};
      const st=map[act]; rq.g1=false; rq.g2=false;
      addTl(rq,"Revision routed — restart at "+statusLabel(st)+".","توجيه التعديل — الاستئناف من "+statusLabel(st)+".",note);
      rq.status=st; notifyOwners(rq,"Revision assigned — please redo your stage.","تم إسناد تعديل — يرجى إعادة مرحلتك."); break; }
    case "cl_ok":
      addTl(rq,"Client approved the video.","اعتمد العميل الفيديو.");
      rq.status="ready_to_publish"; notifyOwners(rq,"Client approved — ready to publish.","اعتمد العميل — جاهز للنشر."); break;
    case "cl_ch":
      addTl(rq,"Client requested changes — routed to Production Head.","طلب العميل تعديلات — أُحيل لرئيس الإنتاج.",note);
      rq.status="revision_routing"; pushNoti("head",rq,"Client requested changes — pick restart stage.","طلب العميل تعديلات — اختر مرحلة الاستئناف."); break;
    case "cl_final":
      addTl(rq,"Client requested a final change — routed to Production Head.","طلب العميل تعديلًا أخيرًا — أُحيل لرئيس الإنتاج.",note);
      rq.status="revision_routing"; pushNoti("head",rq,"Client requested a final change.","طلب العميل تعديلًا أخيرًا."); break;
    case "cl_rej":
      addTl(rq,"Client rejected — cancellation request raised.","رفض العميل — رُفع طلب إلغاء.",note);
      rq.status="cancellation_request"; pushNoti("head",rq,"Client raised a cancellation request.","رفع العميل طلب إلغاء."); break;
    case "tm_publish":
      addTl(rq,"Published & archived — point of no return.","تم النشر والأرشفة — نقطة اللاعودة.");
      rq.status="published"; break;
    case "hd_confirm_cancel":
      addTl(rq,"Cancellation confirmed — task closed (reason recorded).","تم تأكيد الإلغاء — أُغلق الطلب (السبب مسجّل).",note);
      rq.status="cancelled"; break;
    case "hd_continue":
      addTl(rq,"Cancellation declined — continue to revision routing.","رُفض الإلغاء — المتابعة لتوجيه التعديلات.");
      rq.status="revision_routing"; break;
  }
  save(); render();
}
function checkReviewComplete(rq){
  if(rq.g1 && rq.g2){
    rq.clientLink="https://portal.alwatannews.net/c/"+uid()+uid();
    addTl(rq,"Both groups approved — client version shared.","وافقت المجموعتان — تمت مشاركة نسخة العميل.");
    rq.status="client_version";
    pushNoti("client",rq,"A video is ready for your review.","فيديو جاهز لمراجعتك.");
  }
}

/* ---------- note modal (transient, not persisted) ---------- */
function askNote(titleText, cb, required){
  const ov=document.createElement("div"); ov.className="modal-ov";
  ov.innerHTML=`<div class="modal">
    <h2 style="margin-bottom:6px">${esc(titleText)}</h2>
    <div class="small muted" style="margin-bottom:8px">${esc(t("note_change"))}</div>
    <textarea id="noteTA" placeholder="${esc(t("filled_by_role"))}"></textarea>
    <div class="btnrow" style="justify-content:flex-end;margin-top:12px">
      <button class="btn" id="noteCancel">${esc(t("cancel"))}</button>
      <button class="btn primary" id="noteOk">${esc(t("ok"))}</button>
    </div></div>`;
  document.body.appendChild(ov);
  const ta=ov.querySelector("#noteTA"); ta.focus();
  const close=()=>ov.remove();
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  ov.querySelector("#noteCancel").onclick=close;
  ov.querySelector("#noteOk").onclick=()=>{
    const v=ta.value.trim();
    if(required && !v){ ta.style.borderColor="var(--cancelled)"; ta.focus(); return; }
    close(); cb(v);
  };
}

/* ---------- boot ---------- */
render();
