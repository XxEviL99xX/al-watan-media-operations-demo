/* ---------- Detail bindings / actions ---------- */
function bindDetail(){
  const rq=reqById(state.activeReq); const r=myRole();
  document.getElementById("backBtn").onclick=()=>{ state.view="list"; save(); render(); };

  // generic action buttons (some require a note tied to the action)
  const NOTE_ACTIONS={mk_changes:"note_t_changes",hd_changes:"note_t_changes",mk_toreq:"note_t_sendback",
    r1_ch:"note_t_changes",r2_ch:"note_t_changes",cl_ch:"note_t_changes",cl_final:"note_t_final",
    cl_rej:"note_t_reject",hd_confirm_cancel:"note_t_cancel",route_ip:"note_t_route",route_sh:"note_t_route",route_ed:"note_t_route"};
  const REQUIRED=["cl_rej","hd_confirm_cancel"];
  document.querySelectorAll("[data-act]").forEach(el=>el.onclick=()=>{
    const act=el.dataset.act;
    if(act==="re_resubmit"||act==="re_edit"){ state.editReq=rq.id; state.view="new"; save(); render(); return; }
  if(act==="hd_assign"){ askAssign(rq); return; }
    if(act==="re_change"){ state.crEdit=rq.id; state.view="new"; save(); render(); return; }
    if(NOTE_ACTIONS[act]){ askNote(t(NOTE_ACTIONS[act]), (n,f)=>doAction(act,rq,n,f), REQUIRED.includes(act)); return; }
    doAction(act, rq);
  });

  // pending change request — marketing approves/declines, requester withdraws
  document.querySelectorAll("[data-cr]").forEach(el=>el.onclick=()=>{
    const what=el.dataset.cr; const cr=rq.changeReq; if(!cr) return;
    if(what==="approve"){
      Object.assign(rq, cr.fields);
      rq.attachments=(rq.attachments||[]).concat(cr.attachments||[]);
      rq.assign.reporterNeeded=cr.flags.reporterNeeded;
      rq.assign.journalistNeeded=cr.flags.journalistNeeded;
      rq.assign.hebaNeeded=cr.flags.hebaNeeded;
      if(!cr.flags.reporterNeeded) rq.assign.reporter=null;
      if(!cr.flags.journalistNeeded) rq.assign.journalist=null;
      if(!cr.flags.hebaNeeded) rq.assign.heba=null;
      rq.assign.reporterChosen = needsEditorial(rq) && editorialComplete(rq);
      rq.timeline.push(Object.assign(
        tlNote("marketing","Approved the change request — changes applied to the request.","اعتمد طلب التعديل — طُبِّقت التعديلات على الطلب.",""),
        {diff:cr.diff}));
      rq.changeReq=null;
      pushNoti("requester",rq,"Your change request was approved and applied.","تمت الموافقة على طلب تعديلك وتطبيقه.");
      save(); render(); return;
    }
    if(what==="reject"){
      /* per Ahmed: Marketing's second option is CANCEL — terminal, same as the existing cancel */
      askNote(t("note_t_reject_change"), n=>{
        addTl(rq,"Declined the change request — the request was cancelled (reason recorded).","رفض طلب التعديل — أُلغي الطلب (السبب مسجّل).",n);
        rq.changeReq=null;
        rq.status="cancelled";
        pushNoti("requester",rq,"Your change request was declined and the request was cancelled.","تم رفض طلب تعديلك وإلغاء الطلب.");
        save(); render();
      }, true); return;
    }
    if(what==="withdraw"){
      addTl(rq,"Withdrew the change request.","سحب طلب التعديل.");
      rq.changeReq=null;
      save(); render();
    }
  });

  // field tracking — the member themselves stamps start / finish (time + location)
  document.querySelectorAll("[data-field]").forEach(el=>el.onclick=()=>{
    const what=el.dataset.field, me=myRole();
    if(!canTrackNow(rq,me)) return;
    el.disabled=true;
    const msg=document.getElementById("fieldMsg");
    if(msg){ msg.style.display=""; msg.textContent="⏳ "+t("field_locating"); }
    captureLocation(rq, p=>{
      rq.field=rq.field||{};
      const rec=rq.field[me]||(rq.field[me]={});
      /* language-neutral stamp so the audit trail reads the same in both languages */
      const where=`📍 ${p.lat}, ${p.lng}${p.sim?" · simulated / تجريبي":""}`;
      if(what==="start"){
        if(rec.start){ save(); render(); return; }
        rec.start=p;
        addTl(rq,"Started field work.","بدأ العمل الميداني.",where);
      }else{
        if(!rec.start || rec.end){ save(); render(); return; }
        rec.end=p;
        addTl(rq,"Finished field work.","أنهى العمل الميداني.",where+" · "+fmtDur(rec.end.time-rec.start.time));
        /* v7/T4: finishing is the ONLY end action — when the last required member
           on this stage has finished, the workflow advances by itself. */
        finishStageIfDone(rq);
      }
      save(); render();
    });
  });

  // assign chips
  document.querySelectorAll("[data-pick]").forEach(el=>el.onclick=()=>{
    const [key,name]=el.dataset.pick.split("|");
    const arr=rq.assign[key]; const i=arr.indexOf(name);
    if(i>=0) arr.splice(i,1); else arr.push(name);
    save(); render();
  });
  const ft=document.getElementById("assignTeamBtn");
  if(ft) ft.onclick=()=>askAssign(rq);

  // journal editorial staff pick (one chip list per requested role)
  document.querySelectorAll("[data-rep]").forEach(el=>el.onclick=()=>{
    rq.assign.reporter=el.dataset.rep; save(); render();
  });
  document.querySelectorAll("[data-jour]").forEach(el=>el.onclick=()=>{
    rq.assign.journalist=el.dataset.jour; save(); render();
  });
  /* v7/T3: no picker for named people — they are assigned by the requester, so the
     Editorial Manager never selects (or re-selects) them. */
  const cr=document.getElementById("confirmRep");
  if(cr) cr.onclick=()=>{
    if(!editorialComplete(rq)) return;
    rq.assign.reporterChosen=true;
    const staffEn=[rq.assign.reporter&&("Reporter/presenter: "+rq.assign.reporter),rq.assign.journalist&&("Journalist: "+rq.assign.journalist),rq.assign.heba&&"Heba"].filter(Boolean).join(", ");
    const staffAr=[rq.assign.reporter&&("المراسل/المقدّم: "+rq.assign.reporter),rq.assign.journalist&&("الصحفي: "+rq.assign.journalist),rq.assign.heba&&"هبة"].filter(Boolean).join("، ");
    addTl(rq,"Selected "+staffEn+". The complete team is active and production started.","تم اختيار "+staffAr+". الفريق مكتمل وبدأ الإنتاج.");
    rq.status="in_progress";
    notifyOwners(rq,"The complete team is assigned — production has started.","تم تعيين الفريق بالكامل — بدأ الإنتاج.");
    save(); render();
  };

  // comments
  const ca=document.getElementById("cmtAdd");
  if(ca) ca.onclick=async ()=>{
    const box=document.getElementById("cmtBox"); const txt=box.value.trim();
    const err=document.getElementById("cmtErr");
    const picked=document.getElementById("cmtFiles").files||[];
    if(!txt && !picked.length){ err.textContent=t("cmt_empty"); return; }
    err.textContent="";
    const files=await readFiles(picked);
    rq.comments.push({role:r, text:txt, files, time:Date.now(), internal: r!=="client"});
    save(); render();
  };
}

function doAction(act, rq, note, files){
  switch(act){
    case "mk_approve":
      addTl(rq,"Approved — moved to Head approval.","موافقة — أُحيل لموافقة الرئيس.");
      rq.status="head_approval"; pushNoti("head",rq,"A request awaits your approval.","طلب بانتظار موافقتك."); break;
    case "mk_changes":
      addTl(rq,"Requested changes — sent back to Requester.","طلب تعديلات — أُعيد لمقدم الطلب.",note,files);
      rq.status="changes_requester"; pushNoti("requester",rq,"Your request needs changes.","طلبك يحتاج إلى تعديلات."); break;
    case "hd_approve":
      addTl(rq,"Approved — moved to Assign team.","موافقة — الانتقال لتعيين الفريق.");
      rq.status="assign_team"; break; // head himself acts next
    case "hd_changes":
      addTl(rq,"Requested changes — sent to Marketing (comment visible to Requester).","طلب تعديلات — أُرسل للتسويق (التعليق مرئي لمقدم الطلب).",note,files);
      rq.status="changes_marketing";
      pushNoti("marketing",rq,"Head requested changes.","طلب الرئيس تعديلات.");
      pushNoti("requester",rq,"Head left a change comment on your request.","ترك الرئيس تعليق تعديل على طلبك."); break;
    case "mk_forward":
      addTl(rq,"Fixed & forwarded to Head approval.","تم التعديل والإرسال لموافقة الرئيس.");
      rq.status="head_approval"; pushNoti("head",rq,"A request awaits your approval.","طلب بانتظار موافقتك."); break;
    case "mk_toreq":
      addTl(rq,"Sent back to Requester.","أُعيد لمقدم الطلب.",note,files);
      rq.status="changes_requester"; pushNoti("requester",rq,"Your request needs changes.","طلبك يحتاج إلى تعديلات."); break;
    /* v7/T4: only Preparation (in_progress) still has an explicit close action —
       it has no per-person tracking. Shooting/Editing advance from إنهاء العمل. */
    case "tm_done": {
      if(rq.status!=="in_progress") return;
      addTl(rq,"Preparation complete — moved to Shooting.","اكتمل التحضير — الانتقال إلى التصوير.");
      rq.status="shooting";
      notifyOwners(rq,"Shooting is assigned to you.","التصوير مُسنَد إليك.");
      break; }
    case "r1_ok":
      if(!Array.isArray(rq.g1By)) rq.g1By=[];
      if(!rq.g1By.includes(myRole())) rq.g1By.push(myRole());
      rq.g1=true;
      addTl(rq,"Approved — Direction & Production review (Stage 1).","اعتمد — مراجعة الإخراج والإنتاج (المرحلة ١)."); checkReviewComplete(rq); break;
    case "r2_ok":
      if(!Array.isArray(rq.g2By)) rq.g2By=[];
      if(!rq.g2By.includes(myRole())) rq.g2By.push(myRole());
      rq.g2=true;
      addTl(rq,"Approved — Editorial & Publishing review (Stage 2).","اعتمد — مراجعة التحرير والنشر (المرحلة ٢)."); checkReviewComplete(rq); break;
    case "r1_ch": case "r2_ch": {
      const stg = act==="r1_ch"?"review1":"review2";
      rq.revisionSource="review";      /* internal → Shooting/Editing only */
      rq.g1=false; rq.g2=false; rq.g1By=[]; rq.g2By=[];
      addTl(rq,"Requested changes ("+(stg==="review1"?"Direction & Production":"Editorial & Publishing")+") — routed to Production Head.",
               "طلب تعديلات ("+(stg==="review1"?"الإخراج والإنتاج":"التحرير والنشر")+") — أُحيل لرئيس الإنتاج.",note,files);
      rq.status="revision_routing"; pushNoti("head",rq,"Internal review requested changes — pick restart stage.","طلبت المراجعة تعديلات — اختر مرحلة الاستئناف."); break; }
    case "route_ip": case "route_sh": case "route_ed": {
      const map={route_ip:"in_progress",route_sh:"shooting",route_ed:"editing"};
      const st=map[act]; rq.g1=false; rq.g2=false; rq.g1By=[]; rq.g2By=[];
      addTl(rq,"Revision routed — restart at "+statusLabel(st)+".","توجيه التعديل — الاستئناف من "+statusLabel(st)+".",note,files);
      rq.status=st; notifyOwners(rq,"Revision assigned — please redo your stage.","تم إسناد تعديل — يرجى إعادة مرحلتك."); break; }
    case "cl_ok":
      addTl(rq,"Client approved the video.","اعتمد العميل الفيديو.");
      rq.status="ready_to_publish"; notifyOwners(rq,"Client approved — ready to publish.","اعتمد العميل — جاهز للنشر."); break;
    case "cl_ch":
      rq.revisionSource="client";      /* client → full re-plan allowed */
      addTl(rq,"Client requested changes — routed to Production Head.","طلب العميل تعديلات — أُحيل لرئيس الإنتاج.",note,files);
      rq.status="revision_routing"; pushNoti("head",rq,"Client requested changes — pick restart stage.","طلب العميل تعديلات — اختر مرحلة الاستئناف."); break;
    case "cl_final":
      addTl(rq,"Client requested a final change — routed to Production Head.","طلب العميل تعديلًا أخيرًا — أُحيل لرئيس الإنتاج.",note,files);
      rq.status="revision_routing"; pushNoti("head",rq,"Client requested a final change.","طلب العميل تعديلًا أخيرًا."); break;
    case "cl_rej":
      addTl(rq,"Client rejected — cancellation request raised.","رفض العميل — رُفع طلب إلغاء.",note,files);
      rq.status="cancellation_request"; pushNoti("head",rq,"Client raised a cancellation request.","رفع العميل طلب إلغاء."); break;
    case "tm_publish":
      addTl(rq,"Published & archived — point of no return.","تم النشر والأرشفة — نقطة اللاعودة.");
      rq.status="published"; break;
    case "hd_confirm_cancel":
      addTl(rq,"Cancellation confirmed — task closed (reason recorded).","تم تأكيد الإلغاء — أُغلق الطلب (السبب مسجّل).",note,files);
      rq.status="cancelled"; break;
    case "hd_continue":
      addTl(rq,"Cancellation declined — continue to revision routing.","رُفض الإلغاء — المتابعة لتوجيه التعديلات.");
      rq.status="revision_routing"; break;
  }
  save(); render();
}
function checkReviewComplete(rq){
  if(rq.g1 && rq.g2){
    rq.clientLink="https://portal.alwatannews.net/c/"+uid()+uid();
    addTl(rq,"Both review stages approved — client version shared.","اعتُمدت مرحلتا المراجعة — تمت مشاركة نسخة العميل.");
    rq.status="client_version";
    pushNoti("client",rq,"A video is ready for your review.","فيديو جاهز لمراجعتك.");
  }
}

/* applies an assignment and routes onward (shared by the modal and the panel) */
function finalizeAssign(rq){
  /* Record the FULL work order — every assigned member, in the sequence the Head
     chose — as a numbered team timeline in the audit trail. */
  const seq = (rq.assign.seq && rq.assign.seq.length)
    ? rq.assign.seq
    : [...rq.assign.shooting, ...rq.assign.editors];
  const kindOfName=n=>{
    const k=STAFF[n];
    return KIND_LABEL[k] ? KIND_LABEL[k][state.lang] : "";
  };
  const orderEn = seq.map((n,i)=>`${i+1}. ${n}`).join("  →  ");
  const orderAr = seq.map((n,i)=>`${i+1}. ${n} (${kindOfName(n)})`).join("  ←  ");
  const note = (state.lang==="ar" ? orderAr : orderEn);
  if(needsEditorial(rq) && !editorialComplete(rq)){
    addTl(rq,"Assigned the production team — generic editorial roles sent to the Editorial Manager.",
             "تم تعيين فريق الإنتاج — أُحيلت الأدوار التحريرية العامة إلى مسؤول المحررين.",
             t("asg_order")+": "+note);
    rq.status="journal_selection";
    pushNoti("journal", rq, "A team was assigned — please select the editorial staff.","تم تعيين الفريق — يرجى اختيار الطاقم التحريري.");
  }else{
    addTl(rq,"Assigned the team — production started.","تم تعيين الفريق — بدأ الإنتاج.",
             t("asg_order")+": "+note);
    rq.status="in_progress";
    notifyOwners(rq,"You've been assigned — your stage is ready.","تم تعيينك — مرحلتك جاهزة.");
  }
  save(); render();
}

/* ---------- Assign-team modal ----------
   Opens from the queue row or the detail page, like Request changes — the Head
   never has to enter the request to assign. Two technical teams only (Shooting,
   Editing); editorial is read-only here. Once people are picked, the work order
   is drag-reorderable (with ▲▼ as the required non-drag alternative, blueprint
   §747). Order = who shoots first, second, … The protected stage order itself
   (Shooting → Editing → Review) can never be reordered. */
function askAssign(rq){
  const draft={shooting:[...rq.assign.shooting], editors:[...rq.assign.editors], seq:[]};
  let step=1;
  const ov=document.createElement("div"); ov.className="modal-ov";
  ov.innerHTML=`<div class="modal modal-lg"><div id="asgBody"></div></div>`;
  document.body.appendChild(ov); lockScroll();
  const close=()=>{ ov.remove(); unlockScroll(); };
  ov.onclick=e=>{ if(e.target===ov) close(); };

  const body=ov.querySelector("#asgBody");
  let dragFrom=null;

  /* the unified work order: every assigned person in ONE sequence, so the Head
     decides who actually starts first. Defaults to shooting-then-editing but the
     Head may reorder freely — that decision is what gets recorded. */
  function syncSeq(){
    const picked=[...draft.shooting,...draft.editors];
    draft.seq=draft.seq.filter(n=>picked.includes(n));
    picked.forEach(n=>{ if(!draft.seq.includes(n)) draft.seq.push(n); });
  }
  function kindLabelOf(n){
    const k=STAFF[n];
    return KIND_LABEL[k] ? KIND_LABEL[k][state.lang] : "";
  }
  function chips(key,list){
    return list.map(n=>`<span class="chip ${draft[key].includes(n)?"sel":""}" data-tg="${key}|${esc(n)}">${esc(n)}</span>`).join("");
  }
  /* ONE unified sequence across every assigned person — the Head drags to decide
     who actually starts first (e.g. shooters, then editors). This is the team
     timeline Ahmed asked for, and it is what gets written to the audit trail. */
  function orderList(){
    if(!draft.seq.length) return `<div class="small muted">${esc(t("asg_pick_first"))}</div>`;
    const ed=[rq.assign.reporter, rq.assign.journalist, rq.assign.heba].filter(Boolean);
    return `<div class="seq">
      ${draft.seq.map((n,i)=>`
        <div class="seq-row" data-i="${i}" data-name="${esc(n)}">
          <span class="seq-n">${i+1}</span>
          <span class="seq-grip" title="${esc(t("asg_drag"))}">⠿</span>
          <span class="seq-name" dir="auto">${esc(n)}</span>
          <span class="seq-kind">${esc(kindLabelOf(n))}</span>
          <span class="seq-btns">
            <button class="seq-b" data-mv="${i}|-1" ${i===0?"disabled":""}>▲</button>
            <button class="seq-b" data-mv="${i}|1" ${i===draft.seq.length-1?"disabled":""}>▼</button>
          </span>
        </div>`).join("")}
      ${ed.length?ed.map(n=>`<div class="seq-row static">
          <span class="seq-n alt">•</span>
          <span class="seq-name" dir="auto">${esc(n==="Heba"?t("f_heba"):n)}</span>
          <span class="seq-kind">${esc(t("editorial_cov"))}</span>
          <span class="small muted">${esc(t("named_already"))}</span>
        </div>`).join(""):""}
    </div>`;
  }
  /* Horizontal visual timeline of the plan the Head just built — who goes first,
     second, third, and what stage each of them belongs to. */
  function timelinePreview(){
    if(!draft.seq.length) return "";
    return `<div class="tlp">${draft.seq.map((n,i)=>`
      <span class="tlp-i">
        <span class="tlp-av" style="background:${avatarBg(n)}">${esc(n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join(""))}</span>
        <span class="tlp-n">${i+1}. ${esc(n)}</span>
        <span class="tlp-k">${esc(kindLabelOf(n))}</span>
      </span>`).join(`<span class="tlp-a">›</span>`)}</div>`;
  }
  function draw(){
    syncSeq();
    const ready=draft.shooting.length&&draft.editors.length;
    const ed=[rq.assign.reporterNeeded&&("🎤 "+t("f_reporter")+" — "+t("generic_pending")),
              rq.assign.journalistNeeded&&("📰 "+t("f_journalist")+" — "+t("generic_pending")),
              rq.assign.hebaNeeded&&("🎙️ "+t("f_heba")+" — "+t("named_already"))].filter(Boolean);

    const stepDef=[[1,t("asg_step1")],[2,t("asg_step2")]];
    const head=`<div class="modal-h"><h2>${esc(t("assign_h"))}</h2><button class="modal-x" id="asgX">✕</button></div>
      <div class="wiz">
        ${stepDef.map(([n,l])=>`<span class="wiz-i">
           <span class="wiz-s ${step===n?"on":(step>n?"done":"")}">${step>n?"✓":n}</span>
           <span class="wiz-l ${step===n?"on":""}">${esc(l)}</span>
         </span>`).join("")}
      </div>
      <div class="wiz-bar"><i style="width:${step===1?50:100}%"></i></div>`;

    if(step===1){
      body.innerHTML=head+`
        <div class="small muted" style="margin-bottom:14px">${esc(t("asg_sub"))}</div>
        <div class="fld-l">📹 ${esc(t("shooters"))} <span class="req-star">*</span></div>
        <div class="chips">${chips("shooting",ROSTER.shooting)}</div>
        <div class="fld-l" style="margin-top:14px">✂️ ${esc(t("editors"))} <span class="req-star">*</span></div>
        <div class="chips">${chips("editors",ROSTER.editors)}</div>
        <div class="fld-l" style="margin-top:16px">📰 ${esc(t("f_reporter_q"))}</div>
        <div class="small muted" dir="auto">${ed.length?esc(ed.join(" · ")):esc(t("no_editorial"))}</div>
        <div class="modal-f">
          <button class="btn" id="asgClose">${esc(t("cancel"))}</button>
          <button class="btn good" id="asgNext" ${ready?"":"disabled"}>${esc(t("asg_next"))} ›</button>
        </div>
        ${ready?"":`<div class="small muted" style="margin-top:8px">${esc(t("assign_pick_all"))}</div>`}`;
    }else{
      body.innerHTML=head+`
        <div class="fld-l">🗓️ ${esc(t("asg_order"))}</div>
        <div class="small muted" style="margin-bottom:9px">${esc(t("asg_order_hint"))}</div>
        ${orderList()}
        <div class="fld-l" style="margin-top:16px">${esc(t("asg_preview"))}</div>
        ${timelinePreview()}
        <div class="stagebar">${["shooting","editing","internal_review","client_version","published"]
          .map(s=>`<span class="sb-i"><i class="sb-d ${STATUS[s].cls}"></i>${esc(statusLabel(s))}</span>`)
          .join(`<span class="sb-a">›</span>`)}</div>
        <div class="small muted" style="margin-top:5px">${esc(t("asg_locked"))}</div>
        <div class="modal-f">
          <button class="btn" id="asgBack">‹ ${esc(t("asg_back"))}</button>
          <button class="btn good" id="asgOk">${esc(t("finalize_team"))}</button>
        </div>`;
    }
    bind();
  }
  function bind(){
    body.querySelectorAll("[data-tg]").forEach(el=>el.onclick=()=>{
      const [k,n]=el.dataset.tg.split("|");
      const i=draft[k].indexOf(n);
      if(i>=0) draft[k].splice(i,1); else draft[k].push(n);
      draw();
    });
    body.querySelectorAll("[data-mv]").forEach(el=>el.onclick=()=>{
      const [iS,dS]=el.dataset.mv.split("|");
      const i=+iS, j=i+ +dS;
      if(j<0||j>=draft.seq.length) return;
      [draft.seq[i],draft.seq[j]]=[draft.seq[j],draft.seq[i]];
      draw();
    });
    /* Reorder via POINTER events, not HTML5 drag-and-drop — `draggable` never
       fires on touch, so the phone could not reorder at all. Pointer events cover
       mouse, touch and pen with one path. The DOM node is moved live and the
       order is read back on release, so no re-render interrupts the gesture. */
    body.querySelectorAll(".seq-row[data-i]").forEach(el=>{
      const grip=el.querySelector(".seq-grip"); if(!grip) return;
      grip.onpointerdown=e=>{
        e.preventDefault();
        el.classList.add("dragging");
        try{ grip.setPointerCapture(e.pointerId); }catch(_){}
        const onMove=ev=>{
          const pt=document.elementFromPoint(ev.clientX,ev.clientY);
          const over=pt&&pt.closest?pt.closest(".seq-row[data-i]"):null;
          if(!over||over===el||over.parentNode!==el.parentNode) return;
          const r=over.getBoundingClientRect();
          const after=ev.clientY > r.top + r.height/2;
          over.parentNode.insertBefore(el, after?over.nextSibling:over);
        };
        const onUp=()=>{
          window.removeEventListener("pointermove",onMove);
          window.removeEventListener("pointerup",onUp);
          window.removeEventListener("pointercancel",onUp);
          el.classList.remove("dragging");
          /* read the new order straight off the DOM */
          draft.seq=[...body.querySelectorAll(".seq-row[data-name]")].map(r=>r.dataset.name);
          draw();
        };
        window.addEventListener("pointermove",onMove);
        window.addEventListener("pointerup",onUp);
        window.addEventListener("pointercancel",onUp);
      };
    });
    const x=body.querySelector("#asgX"); if(x) x.onclick=close;
    const c=body.querySelector("#asgClose"); if(c) c.onclick=close;
    const nx=body.querySelector("#asgNext"); if(nx) nx.onclick=()=>{ step=2; draw(); };
    const bk=body.querySelector("#asgBack"); if(bk) bk.onclick=()=>{ step=1; draw(); };
    const ok=body.querySelector("#asgOk");
    if(ok) ok.onclick=()=>{
      if(!draft.shooting.length||!draft.editors.length) return;
      /* keep each team list ordered by the unified sequence the Head chose */
      rq.assign.shooting=draft.seq.filter(n=>draft.shooting.includes(n));
      rq.assign.editors =draft.seq.filter(n=>draft.editors.includes(n));
      rq.assign.seq     =[...draft.seq];
      close();
      finalizeAssign(rq);
    };
  }
  draw();
}

/* ---------- note modal ----------
   Carries an optional file: a "request changes" note is often a screenshot or an
   annotated cut, so the reason and its evidence stay together in the audit. */
function askNote(titleText, cb, required){
  const ov=document.createElement("div"); ov.className="modal-ov";
  ov.innerHTML=`<div class="modal">
    <div class="modal-h"><h2>${esc(titleText)}</h2><button class="modal-x" id="noteX">✕</button></div>
    <div class="small muted" style="margin-bottom:8px">${esc(t("note_change"))}</div>
    <textarea id="noteTA" placeholder="${esc(t("filled_by_role"))}"></textarea>
    <div class="small muted" style="margin:10px 0 4px">${esc(t("note_attach"))}</div>
    <input type="file" id="noteFiles" multiple>
    <div class="modal-f">
      <button class="btn" id="noteCancel">${esc(t("cancel"))}</button>
      <button class="btn primary" id="noteOk">${esc(t("ok"))}</button>
    </div></div>`;
  document.body.appendChild(ov); lockScroll();
  const ta=ov.querySelector("#noteTA"); ta.focus();
  const close=()=>{ ov.remove(); unlockScroll(); };
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  ov.querySelector("#noteX").onclick=close;
  ov.querySelector("#noteCancel").onclick=close;
  ov.querySelector("#noteOk").onclick=async ()=>{
    const v=ta.value.trim();
    if(required && !v){ ta.style.borderColor="var(--cancelled)"; ta.focus(); return; }
    const files=await readFiles(ov.querySelector("#noteFiles").files||[]);
    close(); cb(v, files);
  };
}

/* ---------- boot ---------- */
render();
</script>
